/* =========================================
 * Gantt Chart
 * ========================================= */
function GanttView({ projectId, allProjects }) {
  const { state, dispatch, openTask, setMsg } = useApp();
  const projects = allProjects ? state.projects.filter(p => !p.archived) : state.projects.filter(p => p.id===projectId);
  const org = state.organizations.find(o => o.id===state.currentOrgId);

  const [zoom, setZoom] = useState('day'); // day | week | month
  const [groupBy, setGroupBy] = useState(allProjects ? 'project' : 'list'); // project | list | assignee | none
  const [filter, setFilter] = useState({ assignee:'', status:'', label:'', myOnly:false });
  const [showDeps, setShowDeps] = useState(true);
  const [scope, setScope] = useState('auto'); // auto | month | quarter | half
  const containerRef = useRef(null);
  const todayRef = useRef(null);
  const [drag, setDrag] = useState(null);

  const allTasks = state.tasks.filter(t => {
    if (t.archived || !t.dueDate) return false;
    if (!projects.some(p => p.id===t.projectId)) return false;
    if (filter.assignee && !t.assignees.includes(filter.assignee)) return false;
    if (filter.status && t.status !== filter.status) return false;
    if (filter.label) { const proj = projects.find(p => p.id===t.projectId); if (!proj?.labels.find(l => l.id===filter.label)) return false; if (!t.labels.includes(filter.label)) return false; }
    if (filter.myOnly && !t.assignees.includes(state.currentUserId)) return false;
    return true;
  });

  if (allTasks.length === 0) return <GanttEmpty filter={filter} hasFilter={!!(filter.assignee||filter.status||filter.label||filter.myOnly)} />;

  const tasksWithRange = allTasks.map(t => ({ ...t, _start: t.startDate || t.dueDate }));
  const dates = tasksWithRange.flatMap(t => [t._start, t.dueDate]).sort();
  let minD = dates[0];
  let maxD = dates[dates.length-1];
  if (scope === 'month')   { minD = today().slice(0,8)+'01'; maxD = addDays(minD, 31); }
  if (scope === 'quarter') { const m = new Date(today()); m.setDate(1); m.setMonth(m.getMonth()-1); minD = m.toISOString().split('T')[0]; maxD = addDays(minD, 92); }
  if (scope === 'half')    { const m = new Date(today()); m.setDate(1); m.setMonth(m.getMonth()-1); minD = m.toISOString().split('T')[0]; maxD = addDays(minD, 184); }

  const startD = addDays(minD, -3);
  const endD = addDays(maxD, 3);
  const totalDays = daysBetween(startD, endD);
  const dayWidth = zoom==='day' ? 32 : zoom==='week' ? 14 : 5;
  const colWidth = 280;
  const rowHeight = 40;

  const isHoliday = (d) => {
    const dt = new Date(d);
    if (org.holidays.weeklyOff.includes(dt.getDay())) return true;
    if (org.holidays.jpHolidays && JP_HOLIDAYS.has(d)) return true;
    if (org.holidays.customHolidays.includes(d)) return true;
    return false;
  };

  const dayStrs = [];
  for (let i=0; i<=totalDays; i++) dayStrs.push(addDays(startD, i));

  // Group date headers by month
  const monthGroups = [];
  dayStrs.forEach(d => {
    const dt = new Date(d);
    const key = `${dt.getFullYear()}-${dt.getMonth()+1}`;
    const last = monthGroups[monthGroups.length-1];
    if (last && last.key === key) last.count++;
    else monthGroups.push({ key, label: `${dt.getFullYear()}年${dt.getMonth()+1}月`, count: 1 });
  });

  // Group tasks by selected groupBy
  function groupKey(t) {
    if (groupBy === 'project') return t.projectId;
    if (groupBy === 'assignee') return t.assignees[0] || '__unassigned';
    if (groupBy === 'list') {
      const p = projects.find(x => x.id===t.projectId);
      return `${t.projectId}::${p?.lists.find(l => l.id===t.listId)?.id || ''}`;
    }
    return 'all';
  }
  const groupsMap = {};
  tasksWithRange.forEach(t => {
    const k = groupKey(t);
    if (!groupsMap[k]) groupsMap[k] = { key: k, items: [] };
    groupsMap[k].items.push(t);
  });
  const groups = Object.values(groupsMap).map(g => {
    let label = '', accent = 'bg-ink-400', meta = '';
    if (groupBy === 'project')  { const p = projects.find(p => p.id===g.key); label = p?.name||''; accent = `bg-${p?.color}-500`; }
    else if (groupBy === 'assignee') {
      if (g.key === '__unassigned') label = '未割り当て';
      else { const u = userById(org, g.key); label = u?.name||''; }
    }
    else if (groupBy === 'list') {
      const [pid, lid] = g.key.split('::');
      const p = projects.find(p => p.id===pid);
      const l = p?.lists.find(l => l.id===lid);
      label = `${p?.name||''} › ${l?.name||''}`;
      accent = `bg-${p?.color}-500`;
    } else label = 'すべて';
    g.items.sort((a,b) => (a._start||'').localeCompare(b._start||''));
    return { ...g, label, accent };
  }).sort((a,b) => a.label.localeCompare(b.label, 'ja'));

  // Build row index for dependency arrow drawing
  const rowIdx = new Map();
  let cursor = 0;
  groups.forEach(g => { cursor++; g.items.forEach(t => { rowIdx.set(t.id, cursor++); }); });

  const jumpToToday = () => {
    if (!containerRef.current) return;
    const off = daysBetween(startD, today())*dayWidth - 200;
    containerRef.current.scrollTo({ left: Math.max(0, off), behavior:'smooth' });
  };

  // Drag handlers (resize start/due)
  useEffect(() => {
    if (!drag) return;
    const onMove = (e) => {
      const dx = e.clientX - drag.startX;
      const days = Math.round(dx / dayWidth);
      if (days === drag.lastDays) return;
      setDrag({ ...drag, lastDays: days });
    };
    const onUp = () => {
      const t = state.tasks.find(x => x.id===drag.taskId);
      if (t) {
        const days = drag.lastDays || 0;
        const patch = {};
        if (drag.edge === 'start' || drag.edge === 'move') patch.startDate = addDays(t.startDate || t.dueDate, days);
        if (drag.edge === 'end' || drag.edge === 'move')   patch.dueDate   = addDays(t.dueDate, days);
        if (patch.startDate && patch.dueDate && patch.startDate > patch.dueDate) {
          // swap to keep order
          const a = patch.startDate; patch.startDate = patch.dueDate; patch.dueDate = a;
        }
        if (Object.keys(patch).length) {
          dispatch({ type:'UPDATE_TASK', id: drag.taskId, patch });
          setMsg('期間を更新しました');
        }
      }
      setDrag(null);
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    return () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
  }, [drag, dayWidth]);

  const startDrag = (e, taskId, edge) => {
    e.stopPropagation();
    e.preventDefault();
    setDrag({ taskId, edge, startX: e.clientX, lastDays: 0 });
  };
  const dragOffsetPx = drag ? drag.lastDays * dayWidth : 0;

  const exportCSV = () => {
    const rows = [['番号','プロジェクト','タスク','担当','開始','締切','状態','進捗','マイルストーン']];
    tasksWithRange.forEach(t => {
      const proj = projects.find(p => p.id===t.projectId);
      rows.push([t.taskNumber, proj?.name||'', t.title, t.assignees.map(u => userById(org,u)?.name).join(','),
        t._start||'', t.dueDate||'', statusObj(t.status).label, (t.progress||0)+'%', t.milestone?'はい':'']);
    });
    const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob(['﻿'+csv], { type:'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = `gantt_${today()}.csv`; a.click();
    URL.revokeObjectURL(url);
  };
  const exportICS = () => {
    const ics = buildICS(tasksWithRange, state.projects, org?.name);
    downloadICS(`gantt_${today()}.ics`, ics);
    setMsg(`${tasksWithRange.length}件のタスクを .ics で書き出しました`);
  };

  return (
    <div className="flex-1 flex flex-col overflow-hidden">
      {/* Toolbar */}
      <div className="px-4 py-2 border-b border-ink-200 dark:border-ink-700/60 bg-ink-50/70 dark:bg-ink-800/60 flex items-center gap-2 flex-wrap text-sm">
        <div className="inline-flex bg-white dark:bg-ink-700/40 rounded-md p-0.5 hairline">
          {[['day','日'],['week','週'],['month','月']].map(([k,l]) => (
            <button key={k} onClick={()=>setZoom(k)} className={`px-2.5 py-1 text-[12px] rounded ${zoom===k?'bg-accent-600 text-white':'text-ink-600 hover:text-ink-900 dark:text-ink-300'}`}>{l}</button>
          ))}
        </div>
        <Select value={scope} onChange={setScope} options={[
          {value:'auto',   label:'期間：データに合わせる'},
          {value:'month',  label:'期間：今月'},
          {value:'quarter',label:'期間：3ヶ月'},
          {value:'half',   label:'期間：6ヶ月'},
        ]} />
        <Select value={groupBy} onChange={setGroupBy} options={[
          {value:'project',  label:'グループ：プロジェクト'},
          {value:'list',     label:'グループ：リスト'},
          {value:'assignee', label:'グループ：担当者'},
          {value:'none',     label:'グループ：なし'},
        ]} />
        <Select value={filter.assignee} onChange={v=>setFilter({...filter,assignee:v})} options={[
          {value:'', label:'担当：すべて'},
          ...org.members.map(m=>({value:m.id,label:m.name}))
        ]} />
        <Select value={filter.status} onChange={v=>setFilter({...filter,status:v})} options={[
          {value:'', label:'状態：すべて'},
          ...STATUSES.map(s=>({value:s.id,label:s.label}))
        ]} />
        <label className="flex items-center gap-1.5 text-[12px] text-ink-600 dark:text-ink-300"><input type="checkbox" checked={filter.myOnly} onChange={e=>setFilter({...filter,myOnly:e.target.checked})} className="accent-accent-600" /> 自分のタスクのみ</label>
        <label className="flex items-center gap-1.5 text-[12px] text-ink-600 dark:text-ink-300"><input type="checkbox" checked={showDeps} onChange={e=>setShowDeps(e.target.checked)} className="accent-accent-600" /> 先行関係を表示</label>
        <div className="ml-auto flex items-center gap-2">
          <Btn size="sm" variant="ghost" onClick={jumpToToday}>今日へ</Btn>
          <Btn size="sm" variant="ghost" onClick={exportCSV}>CSV</Btn>
          <Btn size="sm" variant="ghost" onClick={exportICS}>.ics</Btn>
          <Btn size="sm" variant="ghost" onClick={()=>window.print()}>印刷</Btn>
        </div>
      </div>

      {/* Body */}
      <div ref={containerRef} className="flex-1 overflow-auto scrollbar-thin bg-white dark:bg-ink-800">
        <div className="relative" style={{ minWidth: (totalDays+1)*dayWidth + colWidth }}>
          {/* Header (2 rows) */}
          <div className="sticky top-0 z-20 bg-white dark:bg-ink-800 border-b border-ink-200 dark:border-ink-700/60 shadow-sm">
            <div className="flex">
              <div className="px-3 py-1.5 border-r border-ink-200 dark:border-ink-700/60 text-[11px] uppercase tracking-wider text-ink-400 font-semibold flex items-center" style={{ width: colWidth }}>タスク</div>
              <div className="flex">
                {monthGroups.map((m,i) => (
                  <div key={i} className="text-center text-[11px] text-ink-500 py-1 border-r border-ink-200 dark:border-ink-700/60 font-medium num"
                    style={{ width: m.count*dayWidth }}>{m.label}</div>
                ))}
              </div>
            </div>
            <div className="flex border-t border-ink-100 dark:border-ink-700/40">
              <div className="border-r border-ink-200 dark:border-ink-700/60" style={{ width: colWidth }}></div>
              <div className="flex">
                {dayStrs.map(d => {
                  const dt = new Date(d);
                  const holiday = isHoliday(d);
                  const todayCl = d===today() ? 'bg-accent-50 dark:bg-accent-900/30 text-accent-700 dark:text-accent-200 font-semibold' : '';
                  const dayColor = dt.getDay()===0 ? 'text-rose-500' : dt.getDay()===6 ? 'text-sky-500' : 'text-ink-500';
                  if (zoom==='month' && dt.getDate() !== 1) {
                    return <div key={d} className={`border-r border-ink-100/60 dark:border-ink-700/30 ${holiday?'bg-rose-50/40 dark:bg-rose-900/10':''} ${todayCl}`} style={{ width: dayWidth }} />;
                  }
                  return <div key={d} className={`text-center text-[10px] border-r border-ink-100 dark:border-ink-700/40 num py-1 ${holiday&&!todayCl?'bg-rose-50/60 dark:bg-rose-900/15':''} ${todayCl}`} style={{ width: dayWidth }}>
                    <div>{dt.getDate()}</div>
                    {zoom!=='month' && <div className={dayColor}>{'日月火水木金土'[dt.getDay()]}</div>}
                  </div>;
                })}
              </div>
            </div>
          </div>

          {/* Today line */}
          <div ref={todayRef} className="absolute top-0 bottom-0 w-px bg-accent-500/60 z-10 pointer-events-none"
            style={{ left: colWidth + daysBetween(startD, today())*dayWidth + dayWidth/2 }}>
            <div className="absolute -top-0.5 -translate-x-1/2 px-1 py-0.5 text-[9px] bg-accent-600 text-white rounded">今日</div>
          </div>

          {/* Rows */}
          {groups.map(g => <Fragment key={g.key}>
            <div className="bg-ink-50 dark:bg-ink-900/30 border-b border-ink-100 dark:border-ink-700/60 px-4 py-2 text-[12px] font-semibold flex items-center gap-2">
              <span className={`w-1.5 h-1.5 rounded-full ${g.accent}`}></span>{g.label}
              <span className="text-[10px] text-ink-400 num font-normal ml-1">{g.items.length}件</span>
            </div>
            {g.items.map(t => {
              const proj = projects.find(p => p.id===t.projectId);
              const startOff = daysBetween(startD, t._start);
              const dur = daysBetween(t._start, t.dueDate) + 1;
              const overdue = isPastDate(t.dueDate) && t.status!=='completed';
              const sObj = statusObj(t.status);
              const isDragTarget = drag && drag.taskId===t.id;
              const xOff = isDragTarget && (drag.edge==='move' || drag.edge==='start') ? dragOffsetPx : 0;
              const wAdj = isDragTarget ? (drag.edge==='end' ? dragOffsetPx : drag.edge==='start' ? -dragOffsetPx : 0) : 0;
              const barLeft = startOff*dayWidth + 3 + xOff;
              const barWidth = Math.max(dur*dayWidth - 6 + wAdj, 12);
              const orgLocal = state.organizations.find(o => o.id===proj?.orgId);
              return <div key={t.id} className="flex border-b border-ink-100 dark:border-ink-700/40 hover:bg-ink-50/40 dark:hover:bg-ink-700/15 group" data-tid={t.id}>
                <div className="px-3 py-2 border-r border-ink-100 dark:border-ink-700/40 text-[13px] flex items-center gap-2 sticky left-0 bg-white dark:bg-ink-800 z-10" style={{ width: colWidth, height: rowHeight }}>
                  <span className="text-[10px] text-ink-400 num flex-shrink-0">#{String(t.taskNumber).padStart(3,'0')}</span>
                  {t.milestone && <span className="text-amber-500 flex-shrink-0" title="マイルストーン">◆</span>}
                  <button onClick={()=>openTask(t.id)} className="text-left hover:text-accent-600 truncate flex-1 leading-tight text-ink-800 dark:text-ink-100">{t.title}</button>
                  <div className="flex -space-x-1.5 flex-shrink-0">
                    {t.assignees.slice(0,2).map(uid => <Avatar key={uid} user={userById(orgLocal,uid)} size={18} ring />)}
                  </div>
                </div>
                <div className="relative flex" style={{ width: (totalDays+1)*dayWidth, height: rowHeight }}>
                  {dayStrs.map(d => (
                    <div key={d} className={`border-r border-ink-100/60 dark:border-ink-700/30 ${isHoliday(d)?'bg-rose-50/40 dark:bg-rose-900/10':''} ${d===today()?'bg-accent-50/40 dark:bg-accent-900/10':''}`} style={{ width: dayWidth }} />
                  ))}
                  {t.milestone ? (
                    <button onClick={()=>openTask(t.id)} title={`${t.title}（${fmtDate(t.dueDate)}）`}
                      className="absolute z-10" style={{ left: barLeft + barWidth/2 - 10, top: rowHeight/2 - 10 }}>
                      <span className="block w-5 h-5 bg-amber-500 rotate-45 rounded-sm shadow-sm border border-white dark:border-ink-800"></span>
                    </button>
                  ) : (
                    <div className="absolute" style={{ left: barLeft, top: 8, width: barWidth, height: rowHeight - 16 }}>
                      <button onMouseDown={(e)=>startDrag(e, t.id, 'move')} onClick={(e)=>{ if(!drag) openTask(t.id); }} title={`${t.title}（${fmtDate(t._start)} 〜 ${fmtDate(t.dueDate)}）`}
                        className={`gantt-bar relative w-full h-full rounded-md ${sObj.color} text-white text-[11px] flex items-center overflow-hidden font-medium shadow-sm cursor-grab active:cursor-grabbing ${overdue?'ring-2 ring-rose-500/70 ring-offset-1 dark:ring-offset-ink-800':''}`}>
                        {/* progress */}
                        {(t.progress||0) > 0 && t.status!=='completed' && (
                          <span className="absolute inset-y-0 left-0 bg-white/30" style={{ width: `${t.progress}%` }}></span>
                        )}
                        <span className="relative px-2 truncate">{t.title}</span>
                      </button>
                      {/* edge handles */}
                      <span onMouseDown={(e)=>startDrag(e, t.id, 'start')} className="absolute left-0 top-0 bottom-0 w-1.5 cursor-ew-resize bg-transparent hover:bg-black/20" title="開始日を変更"></span>
                      <span onMouseDown={(e)=>startDrag(e, t.id, 'end')}   className="absolute right-0 top-0 bottom-0 w-1.5 cursor-ew-resize bg-transparent hover:bg-black/20" title="締切日を変更"></span>
                    </div>
                  )}
                </div>
              </div>;
            })}
          </Fragment>)}

          {/* Dependency arrows (svg overlay) */}
          {showDeps && <DependencyArrows tasksWithRange={tasksWithRange} rowIdx={rowIdx} startD={startD} dayWidth={dayWidth} colWidth={colWidth} rowHeight={rowHeight} headerH={56} />}
        </div>
      </div>
    </div>
  );
}

/* =========================================
 * Schedule (Resource Timeline) View
 * ========================================= */
function ScheduleView() {
  const { state, dispatch, openModal, setMsg } = useApp();
  const sch = (state.schedules||[]).find(s => s.id===state.selectedScheduleId);
  const [zoom, setZoom] = useState('day');
  const [scope, setScope] = useState('auto');
  const [filterStatus, setFilterStatus] = useState('');
  const [editing, setEditing] = useState(null); // booking object or {new:true, resourceId, start}
  const [resourcePane, setResourcePane] = useState(false);
  const [drag, setDrag] = useState(null);
  const containerRef = useRef(null);
  const org = state.organizations.find(o => o.id===state.currentOrgId);

  if (!sch) {
    return <div className="flex-1 flex items-center justify-center bg-white dark:bg-ink-800">
      <div className="text-center">
        <p className="text-ink-500 mb-3 text-[14px]">タイムラインがまだ作成されていません。</p>
        <Btn onClick={()=>openModal('newSchedule')}>＋ 新しいタイムラインを作る</Btn>
      </div>
    </div>;
  }

  const allBookings = sch.bookings.filter(b => !filterStatus || b.status===filterStatus);
  if (allBookings.length === 0 && sch.resources.length === 0) {
    return <ScheduleEmpty sch={sch} />;
  }

  let dates = allBookings.flatMap(b => [b.start, b.end]).filter(Boolean).sort();
  let minD = dates[0] || addDays(today(), -7);
  let maxD = dates[dates.length-1] || addDays(today(), 14);
  if (scope === 'month')   { minD = today().slice(0,8)+'01'; maxD = addDays(minD, 31); }
  if (scope === 'quarter') { const m = new Date(today()); m.setDate(1); m.setMonth(m.getMonth()-1); minD = m.toISOString().split('T')[0]; maxD = addDays(minD, 92); }
  if (scope === 'half')    { const m = new Date(today()); m.setDate(1); m.setMonth(m.getMonth()-1); minD = m.toISOString().split('T')[0]; maxD = addDays(minD, 184); }
  const startD = addDays(minD, -3);
  const endD   = addDays(maxD, 7);
  const totalDays = daysBetween(startD, endD);
  const dayWidth = zoom==='day' ? 36 : zoom==='week' ? 16 : 6;
  const colWidth = 220;
  const rowHeight = 56;

  const dayStrs = []; for (let i=0; i<=totalDays; i++) dayStrs.push(addDays(startD, i));
  const monthGroups = [];
  dayStrs.forEach(d => { const dt=new Date(d); const k=`${dt.getFullYear()}-${dt.getMonth()+1}`; const last=monthGroups[monthGroups.length-1]; if (last&&last.key===k) last.count++; else monthGroups.push({key:k,label:`${dt.getFullYear()}年${dt.getMonth()+1}月`,count:1});});

  const isHoliday = (d) => {
    const dt = new Date(d);
    if (org.holidays.weeklyOff.includes(dt.getDay())) return true;
    if (org.holidays.jpHolidays && JP_HOLIDAYS.has(d)) return true;
    if (org.holidays.customHolidays.includes(d)) return true;
    return false;
  };

  const jumpToToday = () => {
    if (!containerRef.current) return;
    const off = daysBetween(startD, today())*dayWidth - 200;
    containerRef.current.scrollTo({ left: Math.max(0, off), behavior:'smooth' });
  };

  // Drag handler
  useEffect(() => {
    if (!drag) return;
    const onMove = (e) => {
      const dx = e.clientX - drag.startX;
      const days = Math.round(dx / dayWidth);
      if (days === drag.lastDays) return;
      setDrag({ ...drag, lastDays: days });
    };
    const onUp = () => {
      const b = sch.bookings.find(x => x.id===drag.bookingId);
      if (b) {
        const days = drag.lastDays || 0;
        const patch = {};
        if (drag.edge==='start' || drag.edge==='move') patch.start = addDays(b.start, days);
        if (drag.edge==='end'   || drag.edge==='move') patch.end   = addDays(b.end,   days);
        if (patch.start && patch.end && patch.start > patch.end) { const a=patch.start; patch.start=patch.end; patch.end=a; }
        if (Object.keys(patch).length) {
          dispatch({ type:'UPDATE_BOOKING', scheduleId: sch.id, bookingId: b.id, patch });
          setMsg('期間を更新しました');
        }
      }
      setDrag(null);
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    return () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
  }, [drag, dayWidth, sch?.bookings]);

  const startDrag = (e, bookingId, edge) => { e.stopPropagation(); e.preventDefault(); setDrag({ bookingId, edge, startX: e.clientX, lastDays: 0 }); };
  const dragOff = drag ? drag.lastDays*dayWidth : 0;

  const onLaneClick = (resourceId, dayStr) => {
    setEditing({ new:true, scheduleId: sch.id, resourceId, start: dayStr, end: dayStr });
  };

  const exportICS = () => {
    if (sch.bookings.length===0){ setMsg('予定がありません'); return; }
    const tasks = sch.bookings.map(b => ({
      id:b.id, title: `${b.title}${b.customer?` / ${b.customer}`:''}`,
      description:b.notes||'', startDate:b.start, dueDate:b.end, taskNumber:0, status:'in_progress', projectId: sch.id,
    }));
    const fakeProjects = [{ id: sch.id, name: sch.name }];
    downloadICS(`${sch.name}.ics`, buildICS(tasks, fakeProjects, org?.name));
    setMsg(`${sch.bookings.length}件を .ics で書き出しました`);
  };

  const usedStatuses = Array.from(new Set(sch.bookings.map(b => b.status)));

  return (
    <div className="flex-1 flex flex-col overflow-hidden">
      {/* Header */}
      <div className="px-6 py-3.5 border-b border-ink-200 dark:border-ink-700/60 bg-white dark:bg-ink-800 flex items-center gap-3 flex-wrap">
        <span className={`w-2.5 h-2.5 rounded-full bg-${sch.color}-500`}></span>
        <h2 className="text-[16px] font-semibold tracking-tight">{sch.name}</h2>
        <button onClick={()=>dispatch({type:'TOGGLE_FAVORITE_SCHEDULE',id:sch.id})} className={`text-base hover:scale-110 transition ${sch.favorite?'text-amber-500':'text-ink-300 hover:text-amber-400'}`}>★</button>
        <span className="text-[11px] text-ink-400 num">{sch.resourceLabel} {sch.resources.length}件 / {sch.bookingLabel} {sch.bookings.length}件</span>
        <div className="ml-auto flex items-center gap-2">
          <Btn size="sm" variant="outline" onClick={()=>setResourcePane(!resourcePane)}>{sch.resourceLabel}を編集</Btn>
          <Btn size="sm" onClick={()=>setEditing({new:true, scheduleId: sch.id, resourceId: sch.resources[0]?.id, start: today(), end: today() })}>＋ 新規{sch.bookingLabel}</Btn>
        </div>
      </div>

      {/* Toolbar */}
      <div className="px-4 py-2 border-b border-ink-200 dark:border-ink-700/60 bg-ink-50/70 dark:bg-ink-800/60 flex items-center gap-2 flex-wrap text-sm">
        <div className="inline-flex bg-white dark:bg-ink-700/40 rounded-md p-0.5 hairline">
          {[['day','日'],['week','週'],['month','月']].map(([k,l]) => (

        </div>
      </div>

      {/* Body */}
      <div className="flex-1 flex overflow-hidden">
        <div ref={containerRef} className="flex-1 overflow-auto scrollbar-thin bg-white dark:bg-ink-800">
          <div className="relative" style={{ minWidth: (totalDays+1)*dayWidth + colWidth }}>
            {/* Header */}
            <div className="sticky top-0 z-20 bg-white dark:bg-ink-800 border-b border-ink-200 dark:border-ink-700/60 shadow-sm">
              <div className="flex">
                <div className="px-3 py-1.5 border-r border-ink-200 dark:border-ink-700/60 text-[11px] uppercase tracking-wider text-ink-400 font-semibold flex items-center" style={{ width: colWidth }}>{sch.resourceLabel}</div>

                  {monthGroups.map((m,i) => <div key={i} className="text-center text-[11px] text-ink-500 py-1 border-r border-ink-200 dark:border-ink-700/60 font-medium num" style={{ width: m.count*dayWidth }}>{m.label}</div>)}
                </div>
              </div>
              <div className="flex border-t border-ink-100 dark:border-ink-700/40">
                <div className="border-r border-ink-200 dark:border-ink-700/60" style={{ width: colWidth }}></div>
                <div className="flex">
                  {dayStrs.map(d => {
                    const dt=new Date(d); const holiday=isHoliday(d);
                    const todayCl=d===today()?'bg-accent-50 dark:bg-accent-900/30 text-accent-700 dark:text-accent-200 font-semibold':'';
                    const dayColor=dt.getDay()===0?'text-rose-500':dt.getDay()===6?'text-sky-500':'text-ink-500';
                    if (zoom==='month' && dt.getDate()!==1) return <div key={d} className={`border-r border-ink-100/60 dark:border-ink-700/30 ${holiday?'bg-rose-50/40 dark:bg-rose-900/10':''} ${todayCl}`} style={{width:dayWidth}} />;
                    return <div key={d} className={`text-center text-[10px] border-r border-ink-100 dark:border-ink-700/40 num py-1 ${holiday&&!todayCl?'bg-rose-50/60 dark:bg-rose-900/15':''} ${todayCl}`} style={{ width: dayWidth }}>
                      <div>{dt.getDate()}</div>
                      {zoom!=='month' && <div className={dayColor}>{'日月火水木金土'[dt.getDay()]}</div>}
                    </div>;
                  })}
                </div>
              </div>
            </div>

            {/* Today line */}
            <div className="absolute top-0 bottom-0 w-px bg-accent-500/60 z-10 pointer-events-none" style={{ left: colWidth + daysBetween(startD, today())*dayWidth + dayWidth/2 }}>
              <div className="absolute -top-0.5 -translate-x-1/2 px-1 py-0.5 text-[9px] bg-accent-600 text-white rounded">今日</div>
            </div>

            {/* Resource rows */}
            {sch.resources.length === 0 && <div className="px-6 py-12 text-center text-ink-400 text-[13px]">
              {sch.resourceLabel}がまだありません。右上の「{sch.resourceLabel}を編集」から追加できます。
            </div>}
            {sch.resources.map(r => {
              const lane = allBookings.filter(b => b.resourceId===r.id).sort((a,b)=>(a.start||'').localeCompare(b.start||''));
              return <div key={r.id} className="flex border-b border-ink-100 dark:border-ink-700/40 hover:bg-ink-50/30 dark:hover:bg-ink-700/10">
                <div className="px-3 py-2 border-r border-ink-100 dark:border-ink-700/40 sticky left-0 bg-white dark:bg-ink-800 z-10" style={{ width: colWidth, height: rowHeight }}>
                  <div className="flex items-center gap-2">
                    <span className={`w-2 h-2 rounded-full bg-${r.color||sch.color}-500 flex-shrink-0`}></span>
                    <span className="text-[13px] font-medium truncate">{r.name}</span>
                  </div>
                  {r.subtitle && <div className="text-[11px] text-ink-500 truncate mt-0.5 ml-4">{r.subtitle}</div>}
                </div>
                <div className="relative flex" style={{ width: (totalDays+1)*dayWidth, height: rowHeight }}>
                  {dayStrs.map(d => (
                    <button key={d} onDoubleClick={()=>onLaneClick(r.id, d)}
                      className={`border-r border-ink-100/60 dark:border-ink-700/30 ${isHoliday(d)?'bg-rose-50/30 dark:bg-rose-900/10':''} ${d===today()?'bg-accent-50/30 dark:bg-accent-900/10':''} hover:bg-accent-100/30 dark:hover:bg-accent-900/20`} style={{ width: dayWidth }} title="ダブルクリックで予定を追加" />
                  ))}
                  {lane.map(b => {
                    const startOff = daysBetween(startD, b.start);
                    const dur = Math.max(1, daysBetween(b.start, b.end||b.start) + 1);
                    const sObj = bookingStatusObj(b.status);
                    const isDt = drag && drag.bookingId===b.id;
                    const xOff = isDt && (drag.edge==='move'||drag.edge==='start') ? dragOff : 0;
                    const wAdj = isDt ? (drag.edge==='end' ? dragOff : drag.edge==='start' ? -dragOff : 0) : 0;
                    const left = startOff*dayWidth + 3 + xOff;
                    const width = Math.max(dur*dayWidth - 6 + wAdj, 14);
                    return <div key={b.id} className="absolute" style={{ left, top: 8, width, height: rowHeight - 16 }}>
                      <button onMouseDown={(e)=>startDrag(e, b.id, 'move')} onClick={(e)=>{ if(!drag) setEditing(b); }} title={`${b.title}（${fmtDate(b.start)} 〜 ${fmtDate(b.end||b.start)}）`}
                        className={`relative w-full h-full rounded-md ${sObj.color} text-white text-[11px] flex flex-col items-start justify-center px-2 overflow-hidden font-medium shadow-sm cursor-grab active:cursor-grabbing`}>
                        <span className="truncate w-full">{b.title}</span>
                        {b.customer && <span className="truncate w-full text-[10px] opacity-80">{b.customer}</span>}
                      </button>
                      <span onMouseDown={(e)=>startDrag(e, b.id, 'start')} className="absolute left-0 top-0 bottom-0 w-1.5 cursor-ew-resize bg-transparent hover:bg-black/20" title="開始日を変更"></span>
                      <span onMouseDown={(e)=>startDrag(e, b.id, 'end')}   className="absolute right-0 top-0 bottom-0 w-1.5 cursor-ew-resize bg-transparent hover:bg-black/20" title="終了日を変更"></span>
                    </div>;
                  })}
                </div>
              </div>;
            })}
          </div>
        </div>

        {/* Resource pane */}
        {resourcePane && <ResourcePane sch={sch} onClose={()=>setResourcePane(false)} />}
      </div>

      {editing && <BookingModal scheduleId={sch.id} initial={editing} onClose={()=>setEditing(null)} />}
    </div>
  );
}

function BookingModal({ scheduleId, initial, onClose }) {
  const { state, dispatch, setMsg } = useApp();
  const sch = state.schedules.find(s => s.id===scheduleId);
  const isNew = initial.new;
  const [title, setTitle]   = useState(initial.title || '');
  const [resourceId, setResourceId] = useState(initial.resourceId || sch.resources[0]?.id || '');
  const [start, setStart]   = useState(initial.start || today());
  const [end,   setEnd]     = useState(initial.end || initial.start || today());
  const [status, setStatus] = useState(initial.status || (sch.id==='sch_sns' || sch.bookingLabel==='投稿' ? 'scheduled' : 'confirmed'));
  const [notes, setNotes]   = useState(initial.notes || '');
  const [customer, setCustomer] = useState(initial.customer || '');
  const save = () => {
    if (!title.trim()) { setMsg('タイトルを入力してください'); return; }
    if (isNew) {
      dispatch({type:'ADD_BOOKING', scheduleId, resourceId, title: title.trim(), start, end, status, notes, customer});
      setMsg(`${sch.bookingLabel}を追加しました`);
    } else {
      dispatch({type:'UPDATE_BOOKING', scheduleId, bookingId: initial.id, patch:{title:title.trim(), resourceId, start, end, status, notes, customer}});
      setMsg(`${sch.bookingLabel}を更新しました`);
    }
    onClose();
  };
  const remove = () => { if (confirm('この予定を削除しますか？')){ dispatch({type:'DELETE_BOOKING', scheduleId, bookingId: initial.id}); onClose(); } };
  const gcalUrl = (() => {
    if (!start) return null;
    const params = new URLSearchParams({
      action: 'TEMPLATE',
      text: `[${sch.name}] ${title}`,
      dates: `${ymdCompact(start)}/${ymdCompact(addDays(end||start, 1))}`,
      details: `${notes}${customer?`\n顧客: ${customer}`:''}\n${sch.resources.find(r=>r.id===resourceId)?.name||''}`,
    });
    return `https://calendar.google.com/calendar/render?${params.toString()}`;
  })();

  return <Modal open onClose={onClose} title={isNew ? `${sch.bookingLabel}を追加` : `${sch.bookingLabel}を編集`} size="md"
    footer={<>
      {!isNew && <Btn variant="ghost" className="text-rose-600 hover:bg-rose-50 dark:hover:bg-rose-900/20 mr-auto" onClick={remove}>削除</Btn>}
      <Btn variant="ghost" onClick={onClose}>キャンセル</Btn>
      <Btn onClick={save}>{isNew?'追加':'保存'}</Btn>
    </>}>
    <div className="space-y-3">
      <div>
        <label className="text-[11px] uppercase tracking-wider text-ink-400 font-semibold">タイトル</label>
        <Input value={title} onChange={setTitle} placeholder={sch.bookingLabel+'の内容'} className="mt-1.5" />
      </div>
      <div className="grid grid-cols-2 gap-3">
        <div>
          <label className="text-[11px] uppercase tracking-wider text-ink-400 font-semibold">{sch.resourceLabel}</label>
          <Select value={resourceId} onChange={setResourceId} className="w-full mt-1.5"
            options={sch.resources.map(r=>({value:r.id,label:r.name}))} />
        </div>
        <div>
          <label className="text-[11px] uppercase tracking-wider text-ink-400 font-semibold">状態</label>
          <Select value={status} onChange={setStatus} className="w-full mt-1.5"
            options={BOOKING_STATUSES.map(s=>({value:s.id,label:s.label}))} />
        </div>
      </div>
      <div className="grid grid-cols-2 gap-3">
        <div>
          <label className="text-[11px] uppercase tracking-wider text-ink-400 font-semibold">開始</label>
          <input type="date" value={start} onChange={e=>setStart(e.target.value)} className="w-full mt-1.5 px-3 py-1.5 rounded-md border border-ink-200 dark:border-ink-700 bg-white dark:bg-ink-800 text-sm num" />
        </div>
        <div>
          <label className="text-[11px] uppercase tracking-wider text-ink-400 font-semibold">終了</label>
          <input type="date" value={end} onChange={e=>setEnd(e.target.value)} className="w-full mt-1.5 px-3 py-1.5 rounded-md border border-ink-200 dark:border-ink-700 bg-white dark:bg-ink-800 text-sm num" />
        </div>
      </div>
      <div>
        <label className="text-[11px] uppercase tracking-wider text-ink-400 font-semibold">顧客 / 担当</label>
        <Input value={customer} onChange={setCustomer} placeholder="例：田中 太郎、株式会社みらい（任意）" className="mt-1.5" />
      </div>
      <div>
        <label className="text-[11px] uppercase tracking-wider text-ink-400 font-semibold">メモ</label>
        <Textarea value={notes} onChange={setNotes} rows={3} placeholder="連絡事項・補足など" />
      </div>
      {gcalUrl && <div className="pt-1">
        <a href={gcalUrl} target="_blank" rel="noreferrer" className="text-[12px] text-accent-600 hover:underline inline-flex items-center gap-1">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
          Googleカレンダーへ追加
        </a>
      </div>}
    </div>
  </Modal>;
}

function DependencyArrows({ tasksWithRange, rowIdx, startD, dayWidth, colWidth, rowHeight, headerH }) {
  const arrows = [];
  tasksWithRange.forEach(t => {
    (t.dependsOn||[]).forEach(srcId => {
      const src = tasksWithRange.find(x => x.id===srcId);
      if (!src) return;
      const srcRow = rowIdx.get(src.id); const dstRow = rowIdx.get(t.id);
      if (srcRow == null || dstRow == null) return;
      const x1 = colWidth + (daysBetween(startD, src.dueDate)+1)*dayWidth;
      const y1 = headerH + (srcRow-1)*rowHeight + rowHeight/2 + rowHeight; // approximate group row offsets cause minor inaccuracy
      const x2 = colWidth + daysBetween(startD, t._start)*dayWidth + 3;
      const y2 = headerH + (dstRow-1)*rowHeight + rowHeight/2 + rowHeight;
      arrows.push({ x1, y1, x2, y2, key: src.id+'-'+t.id });
    });
  });
  if (arrows.length === 0) return null;
  return <svg className="absolute top-0 left-0 pointer-events-none z-[5]" style={{ width: '100%', height: '100%', overflow: 'visible' }}>
    <defs>
      <marker id="arrowhead-dep" viewBox="0 0 8 8" refX="6" refY="4" markerWidth="6" markerHeight="6" orient="auto">
        <path d="M0 0 L8 4 L0 8 z" fill="#94a3b8" />
      </marker>
    </defs>
    {arrows.map(a => {
      const midX = Math.max(a.x1 + 8, a.x2 - 8);
      const d = `M ${a.x1} ${a.y1} L ${a.x1+8} ${a.y1} L ${midX} ${a.y2} L ${a.x2} ${a.y2}`;
      return <path key={a.key} d={d} stroke="#94a3b8" strokeWidth="1.2" fill="none" strokeDasharray="3 3" markerEnd="url(#arrowhead-dep)" />;
    })}
  </svg>;
}

/* =========================================
 * All Tasks View
 * ========================================= */
function AllTasksView() {
  const { state, openTask } = useApp();
  const [filter, setFilter] = useState({ assignee:'', status:'', period:'all', followingOnly:false, hasDate:'all', projectId:'' });
  const [sort, setSort] = useState({ key:'priority', dir:'asc' });

  let tasks = state.tasks.filter(t => !t.archived);
  if (filter.projectId) tasks = tasks.filter(t => t.projectId===filter.projectId);
  if (filter.assignee) tasks = tasks.filter(t => t.assignees.includes(filter.assignee));
  if (filter.status) tasks = tasks.filter(t => t.status===filter.status);
  if (filter.followingOnly) tasks = tasks.filter(t => t.followers.includes(state.currentUserId));
  if (filter.hasDate==='none') tasks = tasks.filter(t => !t.dueDate);
  if (filter.hasDate==='dated') tasks = tasks.filter(t => t.dueDate);
  if (filter.period==='overdue') tasks = tasks.filter(t => t.dueDate && isPastDate(t.dueDate) && t.status!=='completed');
  if (filter.period==='today') tasks = tasks.filter(t => isTodayDate(t.dueDate));
  if (filter.period==='week') tasks = tasks.filter(t => isWithinDays(t.dueDate, 7));
  if (filter.period==='month') tasks = tasks.filter(t => isWithinDays(t.dueDate, 30));
  tasks.sort((a,b) => {
    if (sort.key === 'priority') {
      const pa = priorityOf(a)?.rank ?? 99;
      const pb = priorityOf(b)?.rank ?? 99;
      const diff = (pa - pb) * (sort.dir==='asc' ? 1 : -1);
      if (diff !== 0) return diff;
      // tie-break by due date
      const av = a.dueDate || '9999-99-99';
      const bv = b.dueDate || '9999-99-99';
      return (av < bv ? -1 : av > bv ? 1 : 0);
    }
    let av = a[sort.key]||'', bv = b[sort.key]||'';
    if (sort.key==='projectId') { av = state.projects.find(p=>p.id===av)?.name||''; bv = state.projects.find(p=>p.id===bv)?.name||''; }
    return (av < bv ? -1 : av > bv ? 1 : 0) * (sort.dir==='asc' ? 1 : -1);
  });
  const setS = (k) => setSort({ key:k, dir: sort.key===k && sort.dir==='asc' ? 'desc' : 'asc' });

  const exportCSV = () => {
    const rows = [['番号','プロジェクト','リスト','タイトル','ステータス','担当者','開始日','締切日','ラベル']];
    tasks.forEach(t => {
      const proj = state.projects.find(p => p.id===t.projectId);
      const list = proj?.lists.find(l => l.id===t.listId);
      const org = state.organizations.find(o => o.id===proj?.orgId);
      rows.push([
        t.taskNumber, proj?.name||'', list?.name||'', t.title, statusObj(t.status).label,
        t.assignees.map(u => userById(org,u)?.name).join(','),
        t.startDate||'', t.dueDate||'',
        t.labels.map(lid => labelById(proj,lid)?.name).join(','),
      ]);
    });
    const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob(['﻿'+csv], { type:'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = `tasks_${today()}.csv`; a.click();
    URL.revokeObjectURL(url);
  };

  return (
    <div className="flex-1 flex flex-col overflow-hidden">
      <div className="px-6 py-3.5 border-b border-ink-200 dark:border-ink-700/60 bg-white dark:bg-ink-800 flex items-center gap-2 flex-wrap">
        <div>
          <h2 className="text-[16px] font-semibold tracking-tight">全てのタスク</h2>
          <div className="text-[11px] text-ink-400 num mt-0.5">{tasks.length}件</div>
        </div>
        <div className="ml-auto flex gap-2">
          <Btn size="sm" variant="outline" onClick={exportCSV}>CSV エクスポート</Btn>
        </div>
      </div>
      <div className="px-6 py-2 border-b border-ink-200 dark:border-ink-700/60 bg-ink-50/60 dark:bg-ink-800/40 flex items-center gap-2 flex-wrap text-sm">
        <Select value={filter.projectId} onChange={v=>setFilter({...filter,projectId:v})} options={[
          {value:'',label:'プロジェクト：すべて'},
          ...state.projects.filter(p=>!p.archived).map(p=>({value:p.id,label:p.name}))
        ]} />
        <Select value={filter.assignee} onChange={v=>setFilter({...filter,assignee:v})} options={[
          {value:'',label:'担当者：すべて'},
          ...state.organizations.find(o=>o.id===state.currentOrgId).members.map(m=>({value:m.id,label:m.name}))
        ]} />
        <Select value={filter.status} onChange={v=>setFilter({...filter,status:v})} options={[
          {value:'',label:'ステータス：すべて'},
          ...STATUSES.map(s=>({value:s.id,label:s.label}))
        ]} />
        <Select value={filter.period} onChange={v=>setFilter({...filter,period:v})} options={[
          {value:'all',label:'期間：指定なし'},
          {value:'overdue',label:'期限切れ'},
          {value:'today',label:'今日が締切'},
          {value:'week',label:'今週中'},
          {value:'month',label:'今月中'},
        ]} />
        <Select value={filter.hasDate} onChange={v=>setFilter({...filter,hasDate:v})} options={[
          {value:'all',label:'日付：すべて'},
          {value:'dated',label:'期日あり'},
          {value:'none',label:'期日なし'},
        ]} />
        <label className="flex items-center gap-1.5 text-[12px] text-ink-600 dark:text-ink-300"><input type="checkbox" checked={filter.followingOnly} onChange={e=>setFilter({...filter,followingOnly:e.target.checked})} className="accent-accent-600" /> フォロー中のみ</label>
      </div>
      <div className="flex-1 overflow-auto scrollbar-thin bg-white dark:bg-ink-800">
        <table className="w-full text-[13px]">
          <thead className="bg-white/95 dark:bg-ink-800/95 backdrop-blur-sm sticky top-0 text-[11px] uppercase tracking-wider text-ink-500 z-10 shadow-[0_1px_0_rgba(15,23,42,0.06)]">
            <tr>
              <th className="text-left px-3 py-2.5 cursor-pointer hover:text-ink-800 font-semibold w-24" onClick={()=>setS('priority')}>優先度</th>
              <th className="text-left px-4 py-2.5 cursor-pointer hover:text-ink-800 num font-semibold w-16" onClick={()=>setS('taskNumber')}>#</th>
              <th className="text-left px-4 py-2.5 cursor-pointer hover:text-ink-800 font-semibold" onClick={()=>setS('projectId')}>プロジェクト</th>
              <th className="text-left px-4 py-2.5 cursor-pointer hover:text-ink-800 font-semibold" onClick={()=>setS('title')}>タイトル</th>
              <th className="text-left px-4 py-2.5 font-semibold">担当</th>
              <th className="text-left px-4 py-2.5 cursor-pointer hover:text-ink-800 font-semibold" onClick={()=>setS('status')}>状態</th>
              <th className="text-left px-4 py-2.5 cursor-pointer hover:text-ink-800 font-semibold num w-28" onClick={()=>setS('startDate')}>開始</th>
              <th className="text-left px-4 py-2.5 cursor-pointer hover:text-ink-800 font-semibold num w-28" onClick={()=>setS('dueDate')}>締切</th>
              <th className="text-left px-4 py-2.5 font-semibold">ラベル</th>
            </tr>
          </thead>
          <tbody>
            {tasks.length === 0 && <tr><td colSpan={9} className="text-center text-ink-400 py-12 text-[13px]">条件に合うタスクはありません</td></tr>}
            {tasks.map((t, idx) => {
              const proj = state.projects.find(p=>p.id===t.projectId);
              const org = state.organizations.find(o=>o.id===proj?.orgId);
              const overdue = t.dueDate && isPastDate(t.dueDate) && t.status!=='completed';
              const dueToday = isTodayDate(t.dueDate) && t.status!=='completed';
              const dueTomorrow = isTomorrow(t.dueDate) && t.status!=='completed';
              const dateColor = overdue?'text-rose-600 font-semibold':dueToday?'text-rose-500':dueTomorrow?'text-amber-600':'text-ink-500 dark:text-ink-400';
              return <tr key={t.id} onClick={()=>openTask(t.id)} className={`border-b border-ink-100 dark:border-ink-700/40 hover:bg-accent-50/40 dark:hover:bg-accent-900/10 cursor-pointer transition-colors ${idx%2===1?'bg-ink-50/40 dark:bg-ink-900/20':''}`}>
                <td className="px-3 py-2.5"><PriorityBadge task={t} compact /></td>
                <td className="px-4 py-2.5 text-ink-400 num">{String(t.taskNumber).padStart(3,'0')}</td>
                <td className="px-4 py-2.5"><span className="inline-flex items-center gap-1.5"><span className={`inline-block w-1.5 h-1.5 rounded-full bg-${proj?.color}-500`}></span>{proj?.name}</span></td>
                <td className="px-4 py-2.5">{t.milestone&&<span className="text-amber-500 mr-1" title="マイルストーン">◆</span>}{t.followers.includes(state.currentUserId)&&<span className="text-amber-500 mr-1">★</span>}{t.title}</td>
                <td className="px-4 py-2.5"><div className="flex -space-x-1.5">{t.assignees.map(u=><Avatar key={u} user={userById(org,u)} size={20} ring />)}</div></td>
                <td className="px-4 py-2.5"><StatusPill status={t.status} /></td>
                <td className="px-4 py-2.5 text-[11px] num text-ink-500">{fmtDate(t.startDate)}</td>
                <td className={`px-4 py-2.5 text-[11px] num ${dateColor}`}>{fmtDate(t.dueDate)}</td>
                <td className="px-4 py-2.5"><div className="flex flex-wrap gap-1">{t.labels.slice(0,3).map(lid => <LabelPill key={lid} label={labelById(proj,lid)} />)}</div></td>
              </tr>;
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* =========================================
 * Search View
 * ========================================= */
function SearchView() {
  const { state, openTask } = useApp();
  const [q, setQ] = useState('');
  const matches = useMemo(() => {
    if (!q.trim()) return [];
    const Q = q.toLowerCase();
    return state.tasks.filter(t => !t.archived && (
      t.title.toLowerCase().includes(Q) ||
      (t.description||'').toLowerCase().includes(Q) ||
      t.comments.some(c => c.text.toLowerCase().includes(Q))
    ));
  }, [q, state.tasks]);
  return (
    <PageContainer title="検索" subtitle="タスクの本文・コメントを横断して検索します。">
      <input autoFocus value={q} onChange={e=>setQ(e.target.value)} placeholder="キーワードを入力"
        className="w-full px-4 py-2.5 rounded-md border border-ink-200 dark:border-ink-700 bg-white dark:bg-ink-800 text-[15px] focus:outline-none focus:ring-2 focus:ring-accent-300 focus:border-accent-400" />
      <p className="text-[12px] text-ink-400 mt-2 num">{q ? `${matches.length} 件ヒットしました` : '上の入力欄にキーワードを入力してください'}</p>
      <div className="mt-4 bg-white dark:bg-ink-800 rounded-md hairline divide-y divide-ink-100 dark:divide-ink-700/50">
        {matches.map(t => <div key={t.id} className="px-3"><TaskRow task={t} onClick={()=>openTask(t.id)} showProject /></div>)}
      </div>
    </PageContainer>
  );
}

/* =========================================
 * AI View
 * ========================================= */
function AIView() {
  const { state, dispatch, setMsg } = useApp();
  const [prompt, setPrompt] = useState('');
  const [target, setTarget] = useState(state.selectedProjectId);
  const [diagnosis, setDiagnosis] = useState(null);
  const [diagTask, setDiagTask] = useState('');

  const generate = () => {
    if (prompt.trim() && target){
      dispatch({type:'AI_GENERATE_TASKS', projectId: target, prompt: prompt.trim()});
      setMsg('タスクを生成しました'); setPrompt('');
    }
  };
  const diagnose = () => {
    const t = state.tasks.find(x => x.id===diagTask);
    if (!t) return;
    const tone = state.aiSettings.feedbackTone;
    const detail = state.aiSettings.summaryDetail;
    const proj = state.projects.find(p => p.id===t.projectId);
    const list = proj?.lists.find(l => l.id===t.listId);
    const lines = [];
    if (detail >= 1) lines.push(`「${t.title}」は ${proj?.name} の「${list?.name}」リストにあります。`);
    if (detail >= 2) lines.push(`ステータスは「${statusObj(t.status).label}」、コメント ${t.comments.length} 件、チェックリストは ${t.checklist.length} 件中 ${t.checklist.filter(c=>c.done).length} 件完了。`);
    if (detail >= 3) lines.push(`期間は ${t.startDate||'未設定'} 〜 ${t.dueDate||'未設定'}。${t.dueDate && isPastDate(t.dueDate) && t.status!=='completed' ? '締切を過ぎています。' : ''}`);
    if (detail >= 4) lines.push(`担当者 ${t.assignees.length} 名 / フォロー ${t.followers.length} 名。コメントの量から見るとやり取りは ${t.comments.length > 3 ? '活発' : 'やや少なめ'}です。`);
    if (detail >= 5) lines.push(`進捗状況・コメント内容・メンバー間のやり取りを総合して評価しています。`);
    const toneText = ['丁寧に：','穏やかに：','中立的に：','率直に：','厳しめに：'][tone-1] || '';
    let fb = '';
    if (t.status==='completed') fb = `${toneText}完了されています。振り返りメモを残しておくと、次の案件にも活かせます。`;
    else if (t.dueDate && isPastDate(t.dueDate)) fb = `${toneText}締切を過ぎています。優先度の見直し、もしくは期限再設定の合意取りを検討してみてください。`;
    else if (t.comments.length === 0) fb = `${toneText}コメントが少ないため状況が見えづらい状態です。担当者か関係者で一度状況をシェアできるとよさそうです。`;
    else fb = `${toneText}進行は順調そうです。次のチェックポイントが近づいたら、関係者にひと声かけておきましょう。`;
    setDiagnosis({ summary: lines.join(' '), feedback: fb });
  };

  return <PageContainer title="アシスタント" subtitle="タスクの自動生成や、いまの進捗の振り返りを手助けします。">
    <div className="space-y-6">
    <Card title="タスクの下書きを作る" subtitle="プロジェクトの目的を入れると、それらしいタスクを自動で並べます">
      <Select value={target} onChange={setTarget} options={state.projects.filter(p=>!p.archived).map(p=>({value:p.id,label:p.name}))} className="mb-2 w-full" />
      <Textarea value={prompt} onChange={setPrompt} placeholder="例：ABC商事のサービスサイトをリニューアルする" rows={3} />
      <Btn className="mt-3" onClick={generate}>下書きを作成</Btn>
    </Card>

    <Card title="タスクの状況を整理する" subtitle="コメントや進捗から、いまの状態と次のひと押しをまとめます">
      <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
        <div>
          <label className="text-[11px] uppercase tracking-wider text-ink-400 font-semibold">要約の粒度</label>
          <input type="range" min="1" max="5" value={state.aiSettings.summaryDetail} onChange={e=>dispatch({type:'SET_AI_SETTINGS',patch:{summaryDetail:+e.target.value}})} className="w-full mt-2 accent-accent-600" />
          <div className="flex justify-between text-[10px] text-ink-400 mt-1"><span>簡潔</span><span className="num">{state.aiSettings.summaryDetail}</span><span>詳しめ</span></div>
        </div>
        <div>
          <label className="text-[11px] uppercase tracking-wider text-ink-400 font-semibold">フィードバックの口調</label>
          <input type="range" min="1" max="5" value={state.aiSettings.feedbackTone} onChange={e=>dispatch({type:'SET_AI_SETTINGS',patch:{feedbackTone:+e.target.value}})} className="w-full mt-2 accent-accent-600" />
          <div className="flex justify-between text-[10px] text-ink-400 mt-1"><span>柔らかく</span><span className="num">{state.aiSettings.feedbackTone}</span><span>率直に</span></div>
        </div>
      </div>
      <Select value={diagTask} onChange={setDiagTask} className="w-full mb-2"
        options={[{value:'',label:'タスクを選んでください'},...state.tasks.filter(t=>!t.archived).map(t=>({value:t.id,label:`#${String(t.taskNumber).padStart(3,'0')} ${t.title}`}))]} />
      <Btn onClick={diagnose}>振り返りを生成</Btn>
      {diagnosis && <div className="mt-4 space-y-2.5">
        <div className="p-3.5 bg-ink-50 dark:bg-ink-700/30 rounded-md">
          <h4 className="text-[11px] uppercase tracking-wider text-ink-400 font-semibold mb-1.5">いまの状況</h4>
          <p className="text-[13px] leading-relaxed">{diagnosis.summary}</p>
        </div>
        <div className="p-3.5 bg-accent-50 dark:bg-accent-900/20 rounded-md">
          <h4 className="text-[11px] uppercase tracking-wider text-accent-700 dark:text-accent-300 font-semibold mb-1.5">提案</h4>
          <p className="text-[13px] leading-relaxed">{diagnosis.feedback}</p>
        </div>
      </div>}
    </Card>
    </div>
  </PageContainer>;
}

    </div>
  </PageContainer>;
}

function ImportCSVModal({ onClose }) {
  const { state, dispatch, setMsg } = useApp();
  const [projectId, setProjectId] = useState(state.selectedProjectId);
  const [text, setText] = useState('リスト,タイトル,説明,開始日,締切日\n未着手,サンプル1,説明テキスト,2026-05-10,2026-05-15');
  const submit = () => {
    const lines = text.trim().split('\n').filter(Boolean);
    if (lines.length < 2) { setMsg('データが不足しています'); return; }
    const headers = lines[0].split(',').map(h => h.trim());
    const rows = lines.slice(1).map(line => {
      const cells = parseCsvLine(line);
      const o = {};
      headers.forEach((h,i) => { o[h] = cells[i]||''; });
      return { list: o['リスト']||o['list']||'未分類', title: o['タイトル']||o['title']||'', description: o['説明']||o['description']||'', startDate: o['開始日']||o['startDate']||null, dueDate: o['締切日']||o['dueDate']||null };
    });
    dispatch({type:'IMPORT_CSV_TASKS', projectId, rows});
    setMsg(`${rows.length}件のタスクをインポートしました`);
    onClose();
  };
  return <Modal open onClose={onClose} title="CSV から取り込み" size="lg" footer={<><Btn variant="ghost" onClick={onClose}>キャンセル</Btn><Btn onClick={submit}>取り込み</Btn></>}>
    <div className="space-y-3">
      <div>
        <label className="text-[11px] uppercase tracking-wider text-ink-400 font-semibold">対象プロジェクト</label>
        <Select value={projectId} onChange={setProjectId} className="w-full mt-1.5" options={state.projects.filter(p=>!p.archived).map(p=>({value:p.id,label:p.name}))} />
      </div>
      <p className="text-[12px] text-ink-500">1行目はヘッダー：<code className="text-[11px]">リスト, タイトル, 説明, 開始日, 締切日</code></p>
      <Textarea value={text} onChange={setText} rows={10} className="font-mono text-[12px]" />
      <div>
        <label className="text-[12px] text-ink-500">またはCSVファイルを選択：</label>
        <input type="file" accept=".csv,.txt" onChange={e=>{
          const f = e.target.files[0]; if (!f) return;
          const r = new FileReader(); r.onload = ev => setText(ev.target.result); r.readAsText(f, 'UTF-8');
        }} className="mt-1 text-[12px] file:mr-2 file:px-2 file:py-1 file:rounded file:border-0 file:bg-ink-100 file:text-ink-700 dark:file:bg-ink-700 dark:file:text-ink-200 file:text-[11px]" />
      </div>
    </div>
  </Modal>;
}
function parseCsvLine(line) {
  const result = []; let cur = ''; let inQ = false;
  for (let i=0; i<line.length; i++) {
    const c = line[i];
    if (inQ) {
      if (c==='"' && line[i+1]==='"') { cur+='"'; i++; }
      else if (c==='"') inQ = false;
      else cur += c;
    } else {
      if (c===',') { result.push(cur); cur=''; }
      else if (c==='"') inQ = true;
      else cur += c;
    }
  }
  result.push(cur);
  return result;
}

/* =========================================
 * Main App
 * ========================================= */
function App() {
  const [state, dispatch] = useReducer(reducer, null, () => loadState() ?? seedData());
  const [openTaskId, setOpenTaskId] = useState(null);
  const [modalName, setModalName] = useState(null);
  const [msg, setMsg] = useState(null);

  useEffect(() => { saveState(state); }, [state]);
  useEffect(() => {
    document.documentElement.classList.toggle('dark', state.darkMode);
  }, [state.darkMode]);
  useEffect(() => {
    if (msg) { const t = setTimeout(()=>setMsg(null), 2000); return () => clearTimeout(t); }
  }, [msg]);

  const org = state.organizations.find(o => o.id===state.currentOrgId);
  const currentUser = userById(org, state.currentUserId);

  const ctx = {
    state, dispatch,
    openTask: (id) => setOpenTaskId(id),
    openModal: (name) => setModalName(name),
    setMsg,
    currentUser,
  };

  const renderView = () => {
    switch (state.view) {
      case 'dashboard': return <Dashboard />;
      case 'all-tasks': return <AllTasksView />;
      case 'all-gantt': return <div className="flex-1 flex flex-col">
        <div className="px-6 py-3.5 border-b border-ink-200 dark:border-ink-700/60 bg-white dark:bg-ink-800">
          <h2 className="text-[16px] font-semibold tracking-tight">全てのガントチャート</h2>
          <p className="text-[11px] text-ink-400 mt-0.5">全プロジェクトを横断して表示しています。</p>
        </div>
        <GanttView allProjects />
      </div>;
      case 'archive': return <ArchiveView />;
      case 'search': return <SearchView />;
      case 'settings': return <SettingsView />;
      case 'automation': return <AutomationView />;
      case 'ai': return <AIView />;
      case 'history': return <HistoryView />;
      case 'gantt': return <div className="flex-1 flex flex-col">
        <div className="px-6 py-3.5 border-b border-ink-200 dark:border-ink-700/60 bg-white dark:bg-ink-800 flex items-center gap-3 flex-wrap">
          {(() => { const p = state.projects.find(p => p.id===state.selectedProjectId); return p ? <div className="flex items-center gap-2.5"><span className={`w-2.5 h-2.5 rounded-full bg-${p.color}-500`}></span><h2 className="text-[16px] font-semibold tracking-tight">{p.name}</h2><span className="text-ink-400 text-[12px]">/ ガントチャート</span></div> : null; })()}
          <div className="ml-auto flex items-center gap-1 bg-ink-100 dark:bg-ink-700/40 rounded-md p-0.5">
            <button onClick={()=>dispatch({type:'SET_VIEW',view:'board'})} className="px-3 py-1 text-[12px] rounded text-ink-600 dark:text-ink-300 hover:text-ink-900">カンバン</button>
            <button className="px-3 py-1 text-[12px] rounded bg-white dark:bg-ink-800 shadow-sm font-semibold">ガント</button>
            <button onClick={()=>dispatch({type:'SET_VIEW',view:'project-settings'})} className="px-3 py-1 text-[12px] rounded text-ink-600 dark:text-ink-300 hover:text-ink-900">設定</button>
          </div>
        </div>
        <GanttView projectId={state.selectedProjectId} />
      </div>;
      case 'project-settings': return <ProjectSettingsView />;
      case 'schedule': return <ScheduleView />;
      case 'board':
      default:
        return <Board />;
    }
  };

  return (
    <AppCtx.Provider value={ctx}>
      <div className="flex h-screen overflow-hidden">
        <Sidebar />
        <div className="flex-1 flex flex-col overflow-hidden">
          <TopBar />
          <div className="flex-1 overflow-hidden flex flex-col">{renderView()}</div>
        </div>
      </div>
      {openTaskId && <TaskModal taskId={openTaskId} onClose={()=>setOpenTaskId(null)} />}
      {modalName==='newProject' && <NewProjectModal onClose={()=>setModalName(null)} />}
      {modalName==='newList' && <NewListModal onClose={()=>setModalName(null)} />}
      {modalName==='newMember' && <NewMemberModal onClose={()=>setModalName(null)} />}
      {modalName==='newBookmark' && <NewBookmarkModal onClose={()=>setModalName(null)} />}
      {modalName==='newAnnouncement' && <NewAnnouncementModal onClose={()=>setModalName(null)} />}
      {modalName==='import' && <ImportCSVModal onClose={()=>setModalName(null)} />}
      {modalName==='aiGenerate' && <AIGenerateModal onClose={()=>setModalName(null)} />}
      {modalName==='switchOrg' && <SwitchOrgModal onClose={()=>setModalName(null)} />}
      {modalName==='newSchedule' && <NewScheduleModal onClose={()=>setModalName(null)} />}
      {modalName==='scheduleSettings' && <ScheduleSettingsModal onClose={()=>setModalName(null)} />}
      <Toast msg={msg} />
    </AppCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
