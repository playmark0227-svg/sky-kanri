  if (task.status === 'completed' || task.status === 'cancelled') return null;

/* ===== Google Calendar / iCal ===== */
function ymdCompact(s) { return s ? s.replace(/-/g,'') : ''; }
function googleCalUrl(task, proj) {
  if (!task.dueDate) return null;
  const start = task.startDate || task.dueDate;
  const endExcl = addDays(task.dueDate, 1); // Google Cal end is exclusive
  const params = new URLSearchParams({
    action: 'TEMPLATE',
    text: `[${proj?.name || ''}] ${task.title}`,
    dates: `${ymdCompact(start)}/${ymdCompact(endExcl)}`,
    details: (task.description || '') + `\n\n#${String(task.taskNumber).padStart(3,'0')} (sky-kanri)`,
  });
  return `https://calendar.google.com/calendar/render?${params.toString()}`;
}
function icsEscape(s) { return String(s||'').replace(/\\/g,'\\\\').replace(/\n/g,'\\n').replace(/,/g,'\\,').replace(/;/g,'\\;'); }
function buildICS(tasks, projects, orgName='sky-kanri') {
  const lines = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    `PRODID:-//sky-kanri//${orgName}//JP`,
    'CALSCALE:GREGORIAN',
    'METHOD:PUBLISH',
  ];
  const now = new Date().toISOString().replace(/[-:]/g,'').replace(/\.\d{3}/, '');
  tasks.forEach(t => {
    if (!t.dueDate) return;
    const proj = projects.find(p => p.id===t.projectId);
    const start = t.startDate || t.dueDate;
    const endExcl = addDays(t.dueDate, 1);
    lines.push(
      'BEGIN:VEVENT',
      `UID:${t.id}@sky-kanri`,
      `DTSTAMP:${now}`,
      `DTSTART;VALUE=DATE:${ymdCompact(start)}`,
      `DTEND;VALUE=DATE:${ymdCompact(endExcl)}`,
      `SUMMARY:${icsEscape(`[${proj?.name||''}] ${t.title}`)}`,
      `DESCRIPTION:${icsEscape((t.description||'') + `\n#${String(t.taskNumber).padStart(3,'0')}`)}`,
      `STATUS:${t.status==='completed'?'CONFIRMED':t.status==='cancelled'?'CANCELLED':'TENTATIVE'}`,
      'END:VEVENT',
    );
  });
  lines.push('END:VCALENDAR');
  return lines.join('\r\n');
}
function downloadICS(filename, content) {
  const blob = new Blob([content], { type: 'text/calendar;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

/* =========================================
 * Reducer
 * ========================================= */
function reducer(state, action) {
  const ts = Date.now();
  const log = (type, text, projectId, taskId) => ({
    id: uid('h'), type, projectId, taskId, userId: state.currentUserId, ts, text,
  });
  switch (action.type) {
    case 'SET_VIEW':
      return { ...state, view: action.view,
        selectedProjectId: action.projectId ?? state.selectedProjectId,
        selectedScheduleId: action.scheduleId ?? state.selectedScheduleId };
    case 'TOGGLE_DARK':
      return { ...state, darkMode: !state.darkMode };
    case 'TOGGLE_SIDEBAR':
      return { ...state, sidebarOpen: !state.sidebarOpen };
    case 'SWITCH_USER':
      return { ...state, currentUserId: action.userId };

    /* ===== Project ===== */
    case 'ADD_PROJECT': {
      const id = uid('p');
      const np = { id, orgId: state.currentOrgId, name: action.name, icon: action.icon || '📋', color: action.color || 'blue',
        archived:false, createdAt:ts, favorite:false,
        lists: action.lists?.length ? action.lists.map((n,i)=>({id:uid('l'),name:n.name||n,autoStatus:n.autoStatus||null,order:i})) : [
          { id: uid('l'), name:'未着手', autoStatus:'not_started', order:0 },
          { id: uid('l'), name:'進行中', autoStatus:'in_progress', order:1 },
          { id: uid('l'), name:'完了', autoStatus:'completed', order:2 },
        ],
        labels: action.labels || [
          { id: uid('lb'), name:'優先度:高', color:'red' },
          { id: uid('lb'), name:'優先度:中', color:'yellow' },
          { id: uid('lb'), name:'優先度:低', color:'green' },
        ],
        members: [{ userId: state.currentUserId, role:'pm' }],
      };
      return { ...state, projects: [...state.projects, np], selectedProjectId: id, view:'board',
        history: [log('project_created', `プロジェクト「${action.name}」を作成`, id), ...state.history] };
    }
    case 'UPDATE_PROJECT': {
      return { ...state, projects: state.projects.map(p => p.id===action.id ? { ...p, ...action.patch } : p) };
    }
    case 'ARCHIVE_PROJECT':
      return { ...state, projects: state.projects.map(p => p.id===action.id ? { ...p, archived:true } : p),
        history: [log('project_archived',`プロジェクトをアーカイブ`,action.id), ...state.history] };
    case 'RESTORE_PROJECT':
      return { ...state, projects: state.projects.map(p => p.id===action.id ? { ...p, archived:false } : p) };
    case 'DELETE_PROJECT':
      return { ...state, projects: state.projects.filter(p => p.id!==action.id),
        tasks: state.tasks.filter(t => t.projectId!==action.id) };
    case 'DUPLICATE_PROJECT': {
      const src = state.projects.find(p => p.id===action.id);
      if (!src) return state;
      const newId = uid('p');
      const listIdMap = {};
      const newLists = src.lists.map(l => { const nid = uid('l'); listIdMap[l.id]=nid; return {...l, id: nid}; });
      const labelIdMap = {};
      const newLabels = src.labels.map(l => { const nid = uid('lb'); labelIdMap[l.id]=nid; return {...l, id: nid}; });
      const newProj = { ...src, id: newId, name: src.name+' (コピー)', lists: newLists, labels: newLabels, archived:false, createdAt: ts, favorite:false };
      const srcTasks = state.tasks.filter(t => t.projectId===src.id && !t.archived);
      let nextNum = state.nextTaskNumber;
      const newTasks = srcTasks.map(t => ({
        ...t, id: uid('t'), projectId: newId, listId: listIdMap[t.listId] || newLists[0].id,
        labels: t.labels.map(lid => labelIdMap[lid] || lid).filter(Boolean),
        comments: [], followers: [], taskNumber: nextNum++, createdAt: ts, updatedAt: ts,
      }));
      return { ...state, projects: [...state.projects, newProj], tasks: [...state.tasks, ...newTasks], nextTaskNumber: nextNum,
        history: [log('project_duplicated',`プロジェクト「${src.name}」を複製`, newId), ...state.history] };
    }
    case 'TOGGLE_FAVORITE_PROJECT':
      return { ...state, projects: state.projects.map(p => p.id===action.id ? { ...p, favorite: !p.favorite } : p) };

    /* ===== Lists ===== */
    case 'ADD_LIST': {
      const id = uid('l');
      return { ...state, projects: state.projects.map(p => p.id===action.projectId ? {
        ...p, lists: [...p.lists, { id, name: action.name, autoStatus: action.autoStatus || null, order: p.lists.length }]
      } : p) };
    }
    case 'UPDATE_LIST':
      return { ...state, projects: state.projects.map(p => p.id===action.projectId ? {
        ...p, lists: p.lists.map(l => l.id===action.listId ? { ...l, ...action.patch } : l)
      } : p) };
    case 'DELETE_LIST': {
      // archive tasks in this list
      return { ...state,
        projects: state.projects.map(p => p.id===action.projectId ? { ...p, lists: p.lists.filter(l => l.id!==action.listId) } : p),
        tasks: state.tasks.map(t => t.projectId===action.projectId && t.listId===action.listId ? { ...t, archived:true } : t),
      };
    }
    case 'REORDER_LISTS':
      return { ...state, projects: state.projects.map(p => p.id===action.projectId ? {
        ...p, lists: action.order.map((id, i) => ({ ...p.lists.find(l=>l.id===id), order: i }))
      } : p) };

    /* ===== Tasks ===== */
    case 'ADD_TASK': {
      const id = uid('t');
      const proj = state.projects.find(p => p.id===action.projectId);
      const list = proj?.lists.find(l => l.id===action.listId);
      const num = state.nextTaskNumber;
      const task = mkTask({ id, projectId: action.projectId, listId: action.listId, taskNumber: num,
        title: action.title || '新しいタスク', status: list?.autoStatus || 'not_started',
        order: state.tasks.filter(t => t.projectId===action.projectId && t.listId===action.listId).length,
        createdAt: ts, updatedAt: ts, ...action.extra });
      return { ...state, tasks: [...state.tasks, task], nextTaskNumber: num+1,
        history: [log('task_created', `「${task.title}」を作成`, action.projectId, id), ...state.history] };
    }
    case 'UPDATE_TASK':
      return { ...state, tasks: state.tasks.map(t => t.id===action.id ? { ...t, ...action.patch, updatedAt: ts } : t),
        history: action.silent ? state.history : [log('task_updated', `「${state.tasks.find(t=>t.id===action.id)?.title}」を更新`, state.tasks.find(t=>t.id===action.id)?.projectId, action.id), ...state.history] };
    case 'MOVE_TASK': {
      const t = state.tasks.find(x => x.id===action.id);
      if (!t) return state;
      const proj = state.projects.find(p => p.id===t.projectId);
      const newList = proj?.lists.find(l => l.id===action.listId);
      const newStatus = newList?.autoStatus || t.status;
      // re-order in target list
      const targetTasks = state.tasks.filter(x => x.projectId===t.projectId && x.listId===action.listId && x.id!==action.id && !x.archived).sort((a,b)=>a.order-b.order);
      const insertAt = typeof action.insertAt === 'number' ? Math.max(0, Math.min(action.insertAt, targetTasks.length)) : targetTasks.length;
      targetTasks.splice(insertAt, 0, { ...t, listId: action.listId, status: newStatus });
      const renumbered = targetTasks.map((x, i) => ({ ...x, order: i }));
      return { ...state, tasks: state.tasks.map(x => {
        if (x.id===action.id) return { ...x, listId: action.listId, status: newStatus, order: renumbered.find(r => r.id===x.id).order, updatedAt: ts };
        const r = renumbered.find(r => r.id===x.id);
        return r ? { ...x, order: r.order } : x;
      }),
      history: [log('task_moved', `「${t.title}」を「${newList?.name}」に移動`, t.projectId, t.id), ...state.history] };
    }
    case 'BULK_MOVE_TASKS': {
      const { ids, listId } = action;
      const newState = { ...state };
      newState.tasks = state.tasks.map(t => {
        if (!ids.includes(t.id)) return t;
        const proj = state.projects.find(p => p.id===t.projectId);
        const newList = proj?.lists.find(l => l.id===listId);
        return { ...t, listId, status: newList?.autoStatus || t.status, updatedAt: ts };
      });
      return newState;
    }
    case 'ARCHIVE_TASK':
      return { ...state, tasks: state.tasks.map(t => t.id===action.id ? { ...t, archived:true } : t) };
    case 'BULK_ARCHIVE_TASKS':
      return { ...state, tasks: state.tasks.map(t => action.ids.includes(t.id) ? { ...t, archived:true } : t) };
    case 'RESTORE_TASK':
      return { ...state, tasks: state.tasks.map(t => t.id===action.id ? { ...t, archived:false } : t) };
    case 'DELETE_TASK':
      return { ...state, tasks: state.tasks.filter(t => t.id!==action.id) };
    case 'DUPLICATE_TASK': {
      const src = state.tasks.find(t => t.id===action.id);
      if (!src) return state;
      const num = state.nextTaskNumber;
      const dup = { ...src, id: uid('t'), title: src.title+' (コピー)', taskNumber: num,
        comments: [], followers: [], createdAt: ts, updatedAt: ts,
        order: state.tasks.filter(t => t.projectId===src.projectId && t.listId===src.listId).length };
      return { ...state, tasks: [...state.tasks, dup], nextTaskNumber: num+1 };
    }
    case 'TOGGLE_FOLLOW': {
      return { ...state, tasks: state.tasks.map(t => {
        if (t.id !== action.id) return t;
        const has = t.followers.includes(state.currentUserId);
        return { ...t, followers: has ? t.followers.filter(u => u!==state.currentUserId) : [...t.followers, state.currentUserId] };
      })};
    }
    case 'ADD_COMMENT': {
      const t = state.tasks.find(x => x.id===action.taskId);
      if (!t) return state;
      const cmt = { id: uid('cm'), userId: state.currentUserId, text: action.text, createdAt: ts };
      return { ...state, tasks: state.tasks.map(x => x.id===action.taskId ? { ...x, comments: [...x.comments, cmt] } : x),
        history: [log('comment', `「${t.title}」にコメント`, t.projectId, t.id), ...state.history] };
    }
    case 'DELETE_COMMENT':
      return { ...state, tasks: state.tasks.map(x => x.id===action.taskId ? { ...x, comments: x.comments.filter(c => c.id!==action.commentId) } : x) };
    case 'ADD_CHECKLIST_ITEM': {
      const item = { id: uid('c'), text: action.text, done: false, assignees: [], startDate: null, dueDate: null };
      return { ...state, tasks: state.tasks.map(x => x.id===action.taskId ? { ...x, checklist: [...x.checklist, item] } : x) };
    }
    case 'UPDATE_CHECKLIST_ITEM':
      return { ...state, tasks: state.tasks.map(x => x.id===action.taskId ? {
        ...x, checklist: x.checklist.map(c => c.id===action.itemId ? { ...c, ...action.patch } : c) } : x) };
    case 'DELETE_CHECKLIST_ITEM':
      return { ...state, tasks: state.tasks.map(x => x.id===action.taskId ? {
        ...x, checklist: x.checklist.filter(c => c.id!==action.itemId) } : x) };

    /* ===== Labels ===== */
    case 'ADD_LABEL':
      return { ...state, projects: state.projects.map(p => p.id===action.projectId ? {
        ...p, labels: [...p.labels, { id: uid('lb'), name: action.name, color: action.color || 'gray' }]
      } : p) };
    case 'UPDATE_LABEL':
      return { ...state, projects: state.projects.map(p => p.id===action.projectId ? {
        ...p, labels: p.labels.map(l => l.id===action.labelId ? { ...l, ...action.patch } : l) } : p) };
    case 'DELETE_LABEL':
      return { ...state,
        projects: state.projects.map(p => p.id===action.projectId ? { ...p, labels: p.labels.filter(l => l.id!==action.labelId) } : p),
        tasks: state.tasks.map(t => t.projectId===action.projectId ? { ...t, labels: t.labels.filter(id => id!==action.labelId) } : t) };

    /* ===== Members ===== */
    case 'ADD_ORG_MEMBER': {
      const id = uid('u');
      const initials = (action.name||'?').trim().slice(0,1);
      const color = AVATAR_INITIALS_BG[Math.floor(Math.random()*AVATAR_INITIALS_BG.length)];
      return { ...state, organizations: state.organizations.map(o => o.id===state.currentOrgId ? {
        ...o, members: [...o.members, { id, name: action.name, email: action.email, role: action.role||'staff', initials, color }]
      } : o) };
    }
    case 'UPDATE_ORG_MEMBER':
      return { ...state, organizations: state.organizations.map(o => o.id===state.currentOrgId ? {
        ...o, members: o.members.map(m => m.id===action.id ? { ...m, ...action.patch } : m) } : o) };
    case 'REMOVE_ORG_MEMBER':
      return { ...state, organizations: state.organizations.map(o => o.id===state.currentOrgId ? {
        ...o, members: o.members.filter(m => m.id!==action.id) } : o) };
    case 'ADD_PROJECT_MEMBER':
      return { ...state, projects: state.projects.map(p => p.id===action.projectId ? {
        ...p, members: p.members.find(m => m.userId===action.userId) ? p.members : [...p.members, { userId: action.userId, role: action.role||'member' }]
      } : p) };
    case 'UPDATE_PROJECT_MEMBER':
      return { ...state, projects: state.projects.map(p => p.id===action.projectId ? {
        ...p, members: p.members.map(m => m.userId===action.userId ? { ...m, role: action.role } : m) } : p) };
    case 'REMOVE_PROJECT_MEMBER':
      return { ...state, projects: state.projects.map(p => p.id===action.projectId ? {
        ...p, members: p.members.filter(m => m.userId!==action.userId) } : p) };

    /* ===== Bookmarks ===== */
    case 'ADD_BOOKMARK':
      return { ...state, organizations: state.organizations.map(o => o.id===state.currentOrgId ? {
        ...o, bookmarks: [...o.bookmarks, { id: uid('b'), title: action.title, url: action.url }] } : o) };
    case 'DELETE_BOOKMARK':
      return { ...state, organizations: state.organizations.map(o => o.id===state.currentOrgId ? {
        ...o, bookmarks: o.bookmarks.filter(b => b.id!==action.id) } : o) };

    /* ===== Announcements (掲示板) ===== */
    case 'ADD_ANNOUNCEMENT':
      return { ...state, organizations: state.organizations.map(o => o.id===state.currentOrgId ? {
        ...o, announcements: [{ id: uid('a'), title: action.title, body: action.body, createdBy: state.currentUserId, createdAt: ts }, ...o.announcements] } : o) };
    case 'DELETE_ANNOUNCEMENT':
      return { ...state, organizations: state.organizations.map(o => o.id===state.currentOrgId ? {
        ...o, announcements: o.announcements.filter(a => a.id!==action.id) } : o) };

    /* ===== Holidays ===== */
    case 'SET_HOLIDAYS':
      return { ...state, organizations: state.organizations.map(o => o.id===state.currentOrgId ? {
        ...o, holidays: { ...o.holidays, ...action.patch } } : o) };

    /* ===== Org profile ===== */
    case 'UPDATE_ORG':
      return { ...state, organizations: state.organizations.map(o => o.id===state.currentOrgId ? { ...o, ...action.patch } : o) };

    /* ===== Notifications ===== */
    case 'MARK_NOTIFICATION_READ':
      return { ...state, notifications: state.notifications.map(n => n.id===action.id ? { ...n, read:true } : n) };
    case 'MARK_ALL_NOTIFICATIONS_READ':
      return { ...state, notifications: state.notifications.map(n => ({ ...n, read:true })) };

    /* ===== Bulk import / export ===== */
    case 'IMPORT_CSV_TASKS': {
      const projId = action.projectId;
      const proj = state.projects.find(p => p.id===projId);
      if (!proj) return state;
      let nextNum = state.nextTaskNumber;
      const newTasks = [];
      for (const row of action.rows) {
        let list = proj.lists.find(l => l.name === row.list);
        let listId;
        if (!list) {
          listId = uid('l');
          // auto-create list
          state = { ...state, projects: state.projects.map(p => p.id===projId ? { ...p, lists: [...p.lists, { id: listId, name: row.list || '未分類', autoStatus: null, order: p.lists.length }] } : p) };
        } else listId = list.id;
        newTasks.push(mkTask({ id: uid('t'), projectId: projId, listId, taskNumber: nextNum++,
          title: row.title || '無題', description: row.description||'',
          assignees: [], startDate: row.startDate||null, dueDate: row.dueDate||null,
          labels: [], status: 'not_started', order: 0,
          createdAt: ts, updatedAt: ts }));
      }
      return { ...state, tasks: [...state.tasks, ...newTasks], nextTaskNumber: nextNum };
    }

    /* ===== AI / Webhook config ===== */
    case 'ADD_WEBHOOK':
      return { ...state, automation: { ...state.automation, webhooks: [...state.automation.webhooks, { id: uid('w'), ...action.patch, enabled:true }] } };
    case 'DELETE_WEBHOOK':
      return { ...state, automation: { ...state.automation, webhooks: state.automation.webhooks.filter(w => w.id!==action.id) } };
    case 'TOGGLE_WEBHOOK':
      return { ...state, automation: { ...state.automation, webhooks: state.automation.webhooks.map(w => w.id===action.id ? { ...w, enabled: !w.enabled } : w) } };
    case 'ADD_API_KEY':
      return { ...state, apiKeys: [...state.apiKeys, { id: uid('k'), name: action.name, key: 'jt_'+Math.random().toString(36).slice(2,18), createdAt: ts }] };
    case 'DELETE_API_KEY':
      return { ...state, apiKeys: state.apiKeys.filter(k => k.id!==action.id) };
    case 'SET_AI_SETTINGS':
      return { ...state, aiSettings: { ...state.aiSettings, ...action.patch } };

    case 'AI_GENERATE_TASKS': {
      // Generates a board from a project description (mock AI)
      const { projectId, prompt } = action;
      const proj = state.projects.find(p => p.id===projectId);
      if (!proj) return state;
      const targetList = proj.lists.find(l => l.autoStatus==='not_started') || proj.lists[0];
      const ideas = generateAITasks(prompt);
      let nextNum = state.nextTaskNumber;
      const newTasks = ideas.map((idea, i) => mkTask({
        id: uid('t'), projectId, listId: targetList.id, taskNumber: nextNum++, title: idea.title, description: idea.description,
        labels: [], assignees: [], startDate: today(), dueDate: addDays(today(), 3+i), status: 'not_started', order: i+100,
        createdAt: ts, updatedAt: ts,
      }));
      return { ...state, tasks: [...state.tasks, ...newTasks], nextTaskNumber: nextNum,
        history: [log('ai_generated', `AIで${ideas.length}件のタスクを自動生成`, projectId), ...state.history] };
    }

    case 'RESET_DATA':
      return seedData();

    /* ===== Schedules ===== */
    case 'ADD_SCHEDULE': {
      const id = uid('sch');
      const sch = {
        id, orgId: state.currentOrgId, name: action.name, color: action.color || 'sky',
        archived: false, createdAt: ts, favorite: false,
        resourceLabel: action.resourceLabel || 'リソース',
        bookingLabel: action.bookingLabel || '予定',
        resources: (action.resources || []).map(r => typeof r === 'string'
          ? { id: uid('r'), name: r, subtitle: '', color: action.color || 'sky' }
          : { id: uid('r'), name: r.name, subtitle: r.subtitle||'', color: r.color||action.color||'sky' }),
        bookings: [],
      };
      return { ...state, schedules: [...(state.schedules||[]), sch], selectedScheduleId: id, view: 'schedule',
        history: [log('schedule_created', `タイムライン「${action.name}」を作成`), ...state.history] };
    }
    case 'UPDATE_SCHEDULE':
      return { ...state, schedules: state.schedules.map(s => s.id===action.id ? { ...s, ...action.patch } : s) };
    case 'ARCHIVE_SCHEDULE':
      return { ...state, schedules: state.schedules.map(s => s.id===action.id ? { ...s, archived:true } : s) };
    case 'RESTORE_SCHEDULE':
      return { ...state, schedules: state.schedules.map(s => s.id===action.id ? { ...s, archived:false } : s) };
    case 'DELETE_SCHEDULE':
      return { ...state, schedules: state.schedules.filter(s => s.id!==action.id) };
    case 'TOGGLE_FAVORITE_SCHEDULE':
      return { ...state, schedules: state.schedules.map(s => s.id===action.id ? { ...s, favorite: !s.favorite } : s) };

    case 'ADD_RESOURCE':
      return { ...state, schedules: state.schedules.map(s => s.id===action.scheduleId ? {
        ...s, resources: [...s.resources, { id: uid('r'), name: action.name, subtitle: action.subtitle||'', color: action.color || s.color }]
      } : s) };
    case 'UPDATE_RESOURCE':
      return { ...state, schedules: state.schedules.map(s => s.id===action.scheduleId ? {
        ...s, resources: s.resources.map(r => r.id===action.resourceId ? { ...r, ...action.patch } : r)
      } : s) };
    case 'DELETE_RESOURCE':
      return { ...state, schedules: state.schedules.map(s => s.id===action.scheduleId ? {
        ...s, resources: s.resources.filter(r => r.id!==action.resourceId),
        bookings: s.bookings.filter(b => b.resourceId !== action.resourceId)
      } : s) };

    case 'ADD_BOOKING': {
      const b = { id: uid('bk'), resourceId: action.resourceId, title: action.title||'新規予定',
        start: action.start, end: action.end || action.start,
        status: action.status || 'confirmed', notes: action.notes||'', customer: action.customer||'',
        createdAt: ts };
      return { ...state, schedules: state.schedules.map(s => s.id===action.scheduleId ? {
        ...s, bookings: [...s.bookings, b]
      } : s) };
    }
    case 'UPDATE_BOOKING':
      return { ...state, schedules: state.schedules.map(s => s.id===action.scheduleId ? {
        ...s, bookings: s.bookings.map(b => b.id===action.bookingId ? { ...b, ...action.patch } : b)
      } : s) };
    case 'DELETE_BOOKING':
      return { ...state, schedules: state.schedules.map(s => s.id===action.scheduleId ? {
        ...s, bookings: s.bookings.filter(b => b.id!==action.bookingId)
      } : s) };

    default:
      return state;
  }
}

/* Mock AI task generation */
function generateAITasks(prompt) {
  // Simple template-based mock AI
  const base = [
    { title: '要件定義', description: `${prompt} に関する要件をまとめる` },
    { title: '設計・スケジュール作成', description: '実装計画を立てる' },
    { title: '初期実装', description: 'プロトタイプを作成' },
    { title: 'レビュー', description: 'チームでレビュー' },
    { title: 'テスト', description: 'QA を実施' },
    { title: 'リリース準備', description: 'ドキュメント整備とリリース' },
  ];
  return base;
}

/* =========================================
 * Context
 * ========================================= */
const AppCtx = createContext(null);
const useApp = () => useContext(AppCtx);

/* =========================================
 * Reusable UI
 * ========================================= */
function Btn({ children, onClick, variant='primary', size='md', icon, className='', type='button', disabled, title }) {
  const variants = {
    primary:   'bg-accent-600 hover:bg-accent-700 active:bg-accent-800 text-white shadow-sm',
    secondary: 'bg-ink-100 hover:bg-ink-200 text-ink-800 dark:bg-ink-700 dark:hover:bg-ink-600 dark:text-ink-100',
    ghost:     'hover:bg-ink-100 dark:hover:bg-ink-800 text-ink-700 dark:text-ink-200',
    danger:    'bg-rose-600 hover:bg-rose-700 active:bg-rose-800 text-white shadow-sm',
    success:   'bg-emerald-600 hover:bg-emerald-700 text-white shadow-sm',
    outline:   'border border-ink-200 dark:border-ink-700 hover:bg-ink-50 dark:hover:bg-ink-800 text-ink-700 dark:text-ink-200',
  };
  const sizes = { xs:'px-2 py-1 text-xs', sm:'px-3 py-1.5 text-sm', md:'px-3.5 py-1.5 text-sm', lg:'px-4 py-2 text-sm' };
  return <button type={type} disabled={disabled} onClick={onClick} title={title}
    className={`inline-flex items-center justify-center gap-1.5 rounded-md font-medium whitespace-nowrap transition focus:outline-none focus:ring-2 focus:ring-accent-300 disabled:opacity-50 disabled:cursor-not-allowed ${variants[variant]} ${sizes[size]} ${className}`}>
    {icon && <span className="opacity-80">{icon}</span>}{children}
  </button>;
}

function Modal({ open, onClose, title, children, footer, size='md', closeOnBackdrop=true }) {
  if (!open) return null;
  const sizeMap = { sm:'max-w-md', md:'max-w-2xl', lg:'max-w-4xl', xl:'max-w-6xl', full:'max-w-[95vw]' };
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-ink-900/60 backdrop-blur modal-backdrop"
         onClick={(e) => { if (closeOnBackdrop && e.target===e.currentTarget) onClose(); }}>
      <div className={`bg-white dark:bg-ink-800 rounded-xl shadow-pop w-full ${sizeMap[size]} max-h-[90vh] flex flex-col modal-content`}>
        {title !== null && <div className="flex items-center justify-between px-5 py-3 border-b border-ink-100 dark:border-ink-700/60">
          <h3 className="font-semibold text-[15px] tracking-tight">{title}</h3>
          <button onClick={onClose} className="text-ink-400 hover:text-ink-800 dark:hover:text-ink-100 text-xl leading-none w-7 h-7 flex items-center justify-center rounded hover:bg-ink-100 dark:hover:bg-ink-700">×</button>
        </div>}
        {title === null && <button onClick={onClose} className="absolute top-3 right-3 text-ink-400 hover:text-ink-800 dark:hover:text-ink-100 text-xl leading-none w-7 h-7 flex items-center justify-center rounded hover:bg-ink-100 dark:hover:bg-ink-700 z-10">×</button>}
        <div className={`flex-1 overflow-y-auto ${title===null?'p-6':'p-5'} scrollbar-thin relative`}>{children}</div>
        {footer && <div className="border-t border-ink-100 dark:border-ink-700/60 px-5 py-3 flex justify-end gap-2">{footer}</div>}
      </div>
    </div>
  );
}

function Input({ value, onChange, placeholder, type='text', className='', ...rest }) {
  return <input type={type} value={value ?? ''} onChange={(e)=>onChange(e.target.value)} placeholder={placeholder}
    className={`w-full px-3 py-1.5 rounded-md border border-ink-200 dark:border-ink-700 bg-white dark:bg-ink-800 text-sm focus:outline-none focus:ring-2 focus:ring-accent-300 focus:border-accent-400 placeholder:text-ink-400 ${className}`} {...rest} />;
}

function Textarea({ value, onChange, placeholder, rows=3, className='' }) {
  return <textarea value={value ?? ''} onChange={(e)=>onChange(e.target.value)} placeholder={placeholder} rows={rows}
    className={`w-full px-3 py-2 rounded-md border border-ink-200 dark:border-ink-700 bg-white dark:bg-ink-800 text-sm focus:outline-none focus:ring-2 focus:ring-accent-300 focus:border-accent-400 placeholder:text-ink-400 resize-y ${className}`} />;
}

function Select({ value, onChange, options, className='' }) {
  return <select value={value ?? ''} onChange={(e)=>onChange(e.target.value)}
    className={`px-2.5 py-1.5 rounded-md border border-ink-200 dark:border-ink-700 bg-white dark:bg-ink-800 text-sm focus:outline-none focus:ring-2 focus:ring-accent-300 focus:border-accent-400 ${className}`}>
    {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
  </select>;
}

function Avatar({ user, size=24, ring=false }) {
  const dim = { width:size, height:size, fontSize: Math.max(10, Math.round(size*0.42)) };
  if (!user) return <span className="inline-flex items-center justify-center rounded-full bg-ink-200 dark:bg-ink-700 text-ink-500 font-medium" style={dim}>?</span>;
  const bg = user.color || 'bg-ink-500';
  const initials = user.initials || (user.name ? user.name.trim().slice(0,1) : '?');
  return <span title={user.name}
    className={`inline-flex items-center justify-center rounded-full text-white font-medium select-none ${bg} ${ring?'ring-2 ring-white dark:ring-ink-800':''}`}
    style={dim}>{initials}</span>;
}

function LabelPill({ label, removable, onRemove }) {
  if (!label) return null;
  const c = colorObj(label.color);
  return <span className={`label-pill ${c.light}`}>
    <span className={`inline-block w-1.5 h-1.5 rounded-full mr-1 ${c.bg}`}></span>
    {label.name}
    {removable && <button className="ml-1 -mr-0.5 hover:opacity-60" onClick={(e)=>{e.stopPropagation();onRemove?.();}}>×</button>}
  </span>;
}

function StatusPill({ status }) {
  const s = statusObj(status);
  return <span className={`inline-flex items-center gap-1.5 text-[11px] px-2 py-0.5 rounded font-medium bg-white dark:bg-ink-800 border border-ink-200 dark:border-ink-700 text-ink-700 dark:text-ink-200`}>
    <span className={`w-1.5 h-1.5 rounded-full ${s.dot}`}></span>{s.label}
  </span>;
}

function Markdown({ text }) {
  if (!text) return <span className="text-gray-400 italic">説明なし</span>;
  const html = marked.parse(text || '', { breaks: true });
  return <div className="markdown" dangerouslySetInnerHTML={{ __html: html }} />;
}

function EmojiPicker({ value, onChange, options }) {
  return <div className="flex flex-wrap gap-1">{options.map(e => (
    <button key={e} type="button" onClick={()=>onChange(e)}
      className={`w-9 h-9 text-xl rounded hover:bg-gray-200 dark:hover:bg-gray-700 ${value===e?'ring-2 ring-blue-500 bg-blue-50 dark:bg-blue-900/30':''}`}>{e}</button>
  ))}</div>;
}

function ColorPicker({ value, onChange, options, size='md' }) {
  const dim = size==='sm' ? 'w-4 h-4' : 'w-5 h-5';
  return <div className="inline-flex flex-wrap gap-1.5">{options.map(c => {
    const co = LABEL_COLORS.find(x => x.id===c) || colorObj(c);
    return <button key={c} type="button" onClick={()=>onChange(c)}
      className={`${dim} rounded-full ${co.bg} hover:scale-110 transition ${value===c?'ring-2 ring-offset-1 ring-ink-700 dark:ring-ink-200':''}`} title={c} />
  })}</div>;
}

function Toast({ msg }) {
  if (!msg) return null;
  return <div className="fixed top-4 right-4 z-[100] bg-ink-900 text-white px-4 py-2 rounded-md shadow-pop text-[13px] toast">{msg}</div>;
}

        <button onClick={()=>dispatch({type:'MARK_ALL_NOTIFICATIONS_READ'})} className="text-xs text-accent-600 hover:underline">すべて既読にする</button>

        {state.notifications.length === 0 && <p className="p-6 text-sm text-ink-400 text-center">通知はありません</p>}

}

/* =========================================
 * Dashboard
 * ========================================= */
function Dashboard() {
  const { state, dispatch, openTask, openModal, currentUser } = useApp();
  const org = state.organizations.find(o => o.id===state.currentOrgId);
  const myTasks = state.tasks.filter(t => !t.archived && t.assignees.includes(state.currentUserId) && t.status !== 'completed');
  const overdue = myTasks.filter(t => t.dueDate && isPastDate(t.dueDate));
  const dueSoon = myTasks.filter(t => t.dueDate && !isPastDate(t.dueDate) && isWithinDays(t.dueDate, 14));
  const followingTasks = state.tasks.filter(t => !t.archived && t.followers.includes(state.currentUserId));

  const myMentions = state.tasks.flatMap(t => t.comments.filter(c => c.text.includes(`@${currentUser?.name}`)).map(c => ({ task: t, comment: c })));

  const today = new Date();
  const greeting = today.getHours() < 11 ? 'おはようございます' : today.getHours() < 18 ? 'こんにちは' : 'お疲れさまです';
  const dayLabel = `${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日（${'日月火水木金土'[today.getDay()]}）`;

  return (
    <div className="p-8 space-y-6 max-w-7xl mx-auto">
      <div className="flex items-end justify-between">
        <div>
          <div className="text-xs text-ink-400 num">{dayLabel}</div>
          <h1 className="text-[22px] font-semibold tracking-tight mt-0.5">{greeting}、{currentUser?.name?.split(' ')[0] ?? ''}さん</h1>
        </div>
        <div className="text-right text-xs text-ink-500 num">
          未完了 <span className="font-semibold text-ink-800 dark:text-ink-100 mx-0.5">{myTasks.length}</span> 件
          <span className="mx-1.5 text-ink-300">/</span>
          期限超過 <span className="font-semibold text-rose-600 mx-0.5">{overdue.length}</span> 件
        </div>
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-3 gap-5">
        <div className="lg:col-span-2 space-y-5">
          <Card title="今日のタスク" subtitle="締切が近い順に並べています" action={<Btn size="xs" variant="ghost" onClick={()=>dispatch({type:'SET_VIEW',view:'all-tasks'})}>すべて見る →</Btn>}>
            {myTasks.length === 0 && <Empty>未完了のタスクはありません。</Empty>}
            {(() => {
              const buckets = [
                { id:'overdue',  label:'期限切れ', tone:'text-rose-600 dark:text-rose-300',  count: 0, items: [] },
                { id:'today',    label:'今日',     tone:'text-rose-500 dark:text-rose-300',  count: 0, items: [] },
                { id:'tomorrow', label:'明日',     tone:'text-amber-600 dark:text-amber-300',count: 0, items: [] },
                { id:'week',     label:'今週中',   tone:'text-amber-700 dark:text-amber-300',count: 0, items: [] },
                { id:'month',    label:'今月中',   tone:'text-ink-600 dark:text-ink-300',    count: 0, items: [] },
                { id:'later',    label:'先',       tone:'text-ink-500 dark:text-ink-400',    count: 0, items: [] },
                { id:'none',     label:'期日なし', tone:'text-ink-400 dark:text-ink-500',    count: 0, items: [] },
              ];
              myTasks.forEach(t => {
                const p = priorityOf(t);
                const id = !t.dueDate ? 'none' : (p?.id || 'later');
                const b = buckets.find(x => x.id===id); if (b){ b.items.push(t); b.count++; }
              });
              buckets.forEach(b => b.items.sort((a,c)=>(a.dueDate||'9').localeCompare(c.dueDate||'9')));
              const visible = buckets.filter(b => b.count > 0);
              return <div className="space-y-3 max-h-[28rem] overflow-y-auto scrollbar-thin pr-1">
                {visible.map(b => <div key={b.id}>
                  <div className={`text-[10px] uppercase tracking-wider font-semibold mb-1 ${b.tone}`}>
                    {b.label} <span className="text-ink-300 num ml-1">{b.count}</span>
                  </div>
                  <div className="divide-y divide-ink-100 dark:divide-ink-700/50">
                    {b.items.slice(0,6).map(t => <TaskRow key={t.id} task={t} onClick={()=>openTask(t.id)} showProject />)}
                  </div>
                </div>)}
              </div>;
            })()}
          </Card>

          <Card title="自分宛のコメント" subtitle="メンションされた発言">
            {myMentions.length === 0 && <Empty>新しいメンションはありません。</Empty>}
            <div className="divide-y divide-ink-100 dark:divide-ink-700/50">
              {myMentions.slice(0,6).map((m, i) => {
                const u = userById(org, m.comment.userId);
                const proj = state.projects.find(p => p.id===m.task.projectId);
                return <button key={i} onClick={()=>openTask(m.task.id)} className="w-full text-left py-3 first:pt-1 last:pb-1 group">
                  <div className="flex items-center gap-2 text-[11px] text-ink-500"><Avatar user={u} size={20} /><span className="font-medium text-ink-700 dark:text-ink-200">{u?.name}</span><span className="text-ink-300">·</span><span className="num">{fmtDateTime(m.comment.createdAt)}</span></div>
                  <div className="text-[13px] mt-1.5 leading-relaxed text-ink-800 dark:text-ink-100">{m.comment.text}</div>
                  <div className="text-[11px] text-ink-500 mt-2 flex items-center gap-1.5 group-hover:text-accent-600 transition">
                    <span className={`w-1.5 h-1.5 rounded-full bg-${proj?.color}-500`}></span>
                    {m.task.title}
                    <span className="ml-0.5 opacity-0 group-hover:opacity-100">→</span>
                  </div>
                </button>;
              })}
            </div>
          </Card>
        </div>

        <div className="space-y-5">
          <Card title="プロジェクトの進み具合">
            <div className="space-y-3.5">
              {state.projects.filter(p=>!p.archived).map(p => {
                const all = state.tasks.filter(t => t.projectId===p.id && !t.archived);
                const done = all.filter(t => t.status==='completed');
                const pct = all.length ? Math.round(done.length/all.length*100) : 0;
                return <div key={p.id}>
                  <div className="flex justify-between text-[12px] mb-1.5">
                    <span className="flex items-center gap-1.5 truncate"><span className={`w-2 h-2 rounded-full bg-${p.color}-500`}></span>{p.name}</span>
                    <span className="text-ink-400 num">{done.length}<span className="text-ink-300">/</span>{all.length}</span>
                  </div>
                  <div className="h-1.5 bg-ink-100 dark:bg-ink-700/50 rounded-full overflow-hidden">
                    <div className={`h-full bg-${p.color}-500`} style={{ width: `${pct}%` }} />
                  </div>
                </div>;
              })}
            </div>
          </Card>

          <Card title="お知らせ" action={
            currentUser?.role!=='guest' && currentUser?.role!=='viewer' ?
            <Btn size="xs" variant="ghost" onClick={()=>openModal('newAnnouncement')}>＋投稿</Btn> : null
          }>
            {org.announcements.length === 0 && <Empty>お知らせはありません。</Empty>}
            <div className="divide-y divide-ink-100 dark:divide-ink-700/50">
              {org.announcements.map(a => {
                const u = userById(org, a.createdBy);
                return <div key={a.id} className="py-3 first:pt-0 last:pb-0">
                  <div className="flex items-center justify-between gap-2">
                    <div className="text-[13px] font-semibold tracking-tight">{a.title}</div>
                    {currentUser?.id===a.createdBy && <button onClick={()=>{if(confirm('削除しますか？')) dispatch({type:'DELETE_ANNOUNCEMENT',id:a.id});}} className="text-ink-400 hover:text-rose-600 text-[11px]">削除</button>}
                  </div>
                  <div className="text-[11px] text-ink-400 mt-1">{u?.name}<span className="mx-1.5 text-ink-300">·</span><span className="num">{fmtDateTime(a.createdAt)}</span></div>
                  <div className="mt-2 text-[12.5px] leading-relaxed text-ink-700 dark:text-ink-300 markdown-tight"><Markdown text={a.body} /></div>
                </div>;
              })}
            </div>
          </Card>

          <Card title="ブックマーク" action={
            currentUser?.role==='admin' ? <Btn size="xs" variant="ghost" onClick={()=>openModal('newBookmark')}>＋追加</Btn> : null
          }>
            {org.bookmarks.length === 0 && <Empty>登録されていません。</Empty>}
            <div className="space-y-1">
              {org.bookmarks.map(b => (
                <div key={b.id} className="group flex items-center gap-2 px-2 py-1 rounded hover:bg-ink-50 dark:hover:bg-ink-700/30">
                  <span className="text-ink-300 text-xs">↗</span>
                  <a href={b.url} target="_blank" rel="noreferrer" className="flex-1 text-[13px] hover:text-accent-600 hover:underline truncate">{b.title}</a>
                  {currentUser?.role==='admin' && <button onClick={()=>{if(confirm('削除しますか？')) dispatch({type:'DELETE_BOOKMARK',id:b.id});}} className="opacity-0 group-hover:opacity-100 text-ink-400 hover:text-rose-600 text-[11px]">×</button>}
                </div>
              ))}
            </div>
          </Card>

          {followingTasks.length > 0 && <Card title="フォロー中">
            <div className="divide-y divide-ink-100 dark:divide-ink-700/50">
              {followingTasks.slice(0,6).map(t => <TaskRow key={t.id} task={t} onClick={()=>openTask(t.id)} showProject />)}
            </div>
          </Card>}
        </div>
      </div>
    </div>
  );
}

function Empty({ children }) {
  return <p className="text-[13px] text-ink-400 py-4 text-center">{children}</p>;
}

function PageContainer({ title, subtitle, children, action, wide=false }) {
  return <div className="flex-1 overflow-y-auto">
    <div className={`px-8 pt-6 pb-4 ${wide?'':'max-w-5xl'}`}>
      <div className="flex items-end justify-between mb-6">
        <div>
          <h1 className="text-[20px] font-semibold tracking-tight">{title}</h1>
          {subtitle && <p className="text-[12px] text-ink-400 mt-1">{subtitle}</p>}
        </div>
        {action}
      </div>
      {children}
    </div>
  </div>;
}

function Card({ title, subtitle, children, action }) {
  return <div className="bg-white dark:bg-ink-800 rounded-lg shadow-card hairline p-4">
    <div className="flex items-end justify-between mb-3">
      <div>
        <h3 className="text-[13px] font-semibold tracking-tight">{title}</h3>
        {subtitle && <div className="text-[11px] text-ink-400 mt-0.5">{subtitle}</div>}
      </div>
      {action}
    </div>
    {children}
  </div>;
}

function TaskRow({ task, onClick, showProject, showPriority }) {
  const { state } = useApp();
  const proj = state.projects.find(p => p.id===task.projectId);
  const org = state.organizations.find(o => o.id===proj?.orgId);
  const p = priorityOf(task);
  const overdue = task.dueDate && isPastDate(task.dueDate) && task.status !== 'completed';
  const dueToday = isTodayDate(task.dueDate) && task.status!=='completed';
  const dueTomorrow = isTomorrow(task.dueDate) && task.status!=='completed';
  const dateColor = overdue ? 'text-rose-600 font-semibold' : dueToday ? 'text-rose-500' : dueTomorrow ? 'text-amber-600' : 'text-ink-500 dark:text-ink-400';
  return (
    <button onClick={onClick} className="w-full text-left flex items-center gap-2.5 px-1.5 py-2 hover:bg-ink-50 dark:hover:bg-ink-700/30 rounded-md transition relative group">
      {p && <span className={`absolute left-0 top-1.5 bottom-1.5 w-0.5 rounded-full ${p.bar}`}></span>}
      <span className={`w-1.5 h-1.5 rounded-full flex-shrink-0 ${statusObj(task.status).dot} ml-1`}></span>
      {showProject && <span className={`w-1.5 h-1.5 rounded-full flex-shrink-0 bg-${proj?.color}-500`} title={proj?.name}></span>}
      <span className="text-[11px] text-ink-400 num w-10 flex-shrink-0">#{String(task.taskNumber).padStart(3,'0')}</span>
      <span className="flex-1 truncate text-[13px] text-ink-800 dark:text-ink-100">{task.title}</span>
      {showPriority && p && <PriorityBadge task={task} compact />}
      <div className="hidden sm:flex items-center gap-1.5">
        {task.labels.slice(0,2).map(lid => { const l = labelById(proj, lid); return l ? <LabelPill key={lid} label={l} /> : null; })}
      </div>
      <div className="flex -space-x-1">
        {task.assignees.slice(0,2).map(u => <Avatar key={u} user={userById(org,u)} size={18} ring />)}
      </div>
      {task.dueDate && <span className={`text-[11px] num w-14 text-right ${dateColor}`}>{fmtDate(task.dueDate).slice(5)}</span>}
    </button>
  );
}

/* =========================================
 * Kanban Board
 * ========================================= */
function Board() {
  const { state, dispatch, openTask, openModal } = useApp();
  const proj = state.projects.find(p => p.id===state.selectedProjectId);
  const [draggingTaskId, setDraggingTaskId] = useState(null);
  const [bulkSelected, setBulkSelected] = useState(new Set());
  const [filter, setFilter] = useState({ assignee:'', label:'', status:'', search:'', followingOnly:false });

  if (!proj) return <div className="p-8 text-gray-500">プロジェクトが選択されていません。サイドバーから選択するか、新規作成してください。</div>;

  const filteredTasks = state.tasks.filter(t => {
    if (t.projectId !== proj.id || t.archived) return false;
    if (filter.assignee && !t.assignees.includes(filter.assignee)) return false;
    if (filter.label && !t.labels.includes(filter.label)) return false;
    if (filter.status && t.status !== filter.status) return false;
    if (filter.followingOnly && !t.followers.includes(state.currentUserId)) return false;
    if (filter.search && !(t.title+' '+t.description).toLowerCase().includes(filter.search.toLowerCase())) return false;
    return true;
  });

  const toggleSelect = (id) => {
    const ns = new Set(bulkSelected);
    if (ns.has(id)) ns.delete(id); else ns.add(id);
    setBulkSelected(ns);
  };

  const onDragStart = (e, taskId) => {
    setDraggingTaskId(taskId);
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', taskId);
  };
  const onDrop = (e, listId) => {
    e.preventDefault();
    e.currentTarget.classList.remove('drag-over');
    const id = e.dataTransfer.getData('text/plain');
    if (id) {
      if (bulkSelected.has(id) && bulkSelected.size > 1) {
        dispatch({ type:'BULK_MOVE_TASKS', ids: [...bulkSelected], listId });
        setBulkSelected(new Set());
      } else {
        dispatch({ type:'MOVE_TASK', id, listId });
      }
    }
    setDraggingTaskId(null);
  };

  const bulkArchive = () => {
    if (bulkSelected.size && confirm(`${bulkSelected.size}件のタスクをアーカイブしますか？`)) {
      dispatch({ type:'BULK_ARCHIVE_TASKS', ids: [...bulkSelected] });
      setBulkSelected(new Set());
    }
  };

  return (
    <div className="flex-1 flex flex-col overflow-hidden">
      <div className="px-6 py-3.5 border-b border-ink-200 dark:border-ink-700/60 bg-white dark:bg-ink-800 flex items-center gap-3 flex-wrap">
        <div className="flex items-center gap-2.5">
          <span className={`w-2.5 h-2.5 rounded-full bg-${proj.color}-500`}></span>
          <h2 className="text-[16px] font-semibold tracking-tight">{proj.name}</h2>
          <button onClick={()=>dispatch({type:'TOGGLE_FAVORITE_PROJECT',id:proj.id})} className={`text-base hover:scale-110 transition ${proj.favorite?'text-amber-500':'text-ink-300 hover:text-amber-400'}`}>★</button>
        </div>
        <div className="ml-auto flex items-center gap-1 bg-ink-100 dark:bg-ink-700/40 rounded-md p-0.5">
          {[['board','カンバン'],['gantt','ガント'],['project-settings','設定']].map(([k,l]) => (
            <button key={k} onClick={()=>dispatch({type:'SET_VIEW',view:k})}
              className={`px-3 py-1 text-[12px] rounded ${state.view===k?'bg-white dark:bg-ink-800 shadow-sm font-semibold':'text-ink-600 dark:text-ink-300 hover:text-ink-900'}`}>{l}</button>
          ))}
        </div>
      </div>

      <div className="px-6 py-2 border-b border-ink-200 dark:border-ink-700/60 bg-ink-50/60 dark:bg-ink-800/40 flex items-center gap-2 flex-wrap text-sm">
        <div className="relative">
          <span className="absolute left-2.5 top-1/2 -translate-y-1/2 text-ink-400 text-xs">⌕</span>
          <input value={filter.search} onChange={e=>setFilter({...filter,search:e.target.value})} placeholder="このボード内を検索"
            className="pl-7 pr-2 py-1 rounded-md border border-ink-200 dark:border-ink-700 bg-white dark:bg-ink-800 text-[12px] focus:outline-none focus:ring-2 focus:ring-accent-300 w-44" />
        </div>
        <Select value={filter.assignee} onChange={v=>setFilter({...filter,assignee:v})} options={[
          {value:'',label:'担当者：すべて'},
          ...state.organizations.find(o=>o.id===proj.orgId).members.map(m=>({value:m.id,label:m.name}))
        ]} />
        <Select value={filter.label} onChange={v=>setFilter({...filter,label:v})} options={[
          {value:'',label:'ラベル：すべて'},
          ...proj.labels.map(l=>({value:l.id,label:l.name}))
        ]} />
        <Select value={filter.status} onChange={v=>setFilter({...filter,status:v})} options={[
          {value:'',label:'ステータス：すべて'},
          ...STATUSES.map(s=>({value:s.id,label:s.label}))
        ]} />
        <label className="flex items-center gap-1.5 text-[12px] text-ink-600 dark:text-ink-300"><input type="checkbox" checked={filter.followingOnly} onChange={e=>setFilter({...filter,followingOnly:e.target.checked})} className="accent-accent-600" /> フォロー中のみ</label>
        {(filter.search||filter.assignee||filter.label||filter.status||filter.followingOnly) &&
          <button onClick={()=>setFilter({assignee:'',label:'',status:'',search:'',followingOnly:false})} className="text-[11px] text-ink-500 hover:text-ink-800 underline">条件をリセット</button>}
        {bulkSelected.size > 0 && <div className="ml-auto flex items-center gap-2 text-[12px]">
          <span className="text-accent-700 dark:text-accent-300 font-medium">{bulkSelected.size}件選択中</span>
          <Btn size="xs" variant="danger" onClick={bulkArchive}>一括アーカイブ</Btn>
          <Btn size="xs" variant="ghost" onClick={()=>setBulkSelected(new Set())}>選択解除</Btn>
        </div>}
      </div>

      <div className="flex-1 overflow-x-auto p-5 scrollbar-thin bg-ink-100/50 dark:bg-ink-900/40">
        <div className="flex gap-3 h-full" style={{ width: 'max-content', minWidth: '100%' }}>
          {[...proj.lists].sort((a,b)=>a.order-b.order).map(list => (
            <BoardList key={list.id} list={list} project={proj}
              tasks={filteredTasks.filter(t => t.listId===list.id).sort((a,b)=>a.order-b.order)}
              onDragStart={onDragStart} onDrop={onDrop}
              draggingTaskId={draggingTaskId}
              bulkSelected={bulkSelected} onToggleSelect={toggleSelect} />
          ))}
          <div className="w-72 flex-shrink-0">
            <button onClick={()=>openModal('newList')}
              className="w-full p-3 rounded-md border border-dashed border-ink-300 dark:border-ink-700 text-ink-500 text-[13px] hover:bg-white dark:hover:bg-ink-800 hover:border-accent-400 hover:text-accent-600 transition">
              ＋ リストを追加
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function BoardList({ list, project, tasks, onDragStart, onDrop, draggingTaskId, bulkSelected, onToggleSelect }) {
  const { state, dispatch, openTask, openModal, setMsg } = useApp();
  const [adding, setAdding] = useState(false);
  const [newTitle, setNewTitle] = useState('');
  const [editing, setEditing] = useState(false);
  const [editName, setEditName] = useState(list.name);
  const [showMenu, setShowMenu] = useState(false);

  const onDragOver = (e) => { e.preventDefault(); e.currentTarget.classList.add('drag-over'); };
  const onDragLeave = (e) => { e.currentTarget.classList.remove('drag-over'); };

  const addTask = () => {
    if (newTitle.trim()) {
      dispatch({ type:'ADD_TASK', projectId: project.id, listId: list.id, title: newTitle.trim() });
      setNewTitle(''); setMsg(`「${newTitle.trim()}」を追加しました`);
    }
    setAdding(false);
  };

  const saveListName = () => {
    if (editName.trim() && editName !== list.name) {
      dispatch({ type:'UPDATE_LIST', projectId: project.id, listId: list.id, patch: { name: editName.trim() } });
    }
    setEditing(false);
  };

  const setAutoStatus = (status) => {
    dispatch({ type:'UPDATE_LIST', projectId: project.id, listId: list.id, patch: { autoStatus: status || null } });
    setShowMenu(false);
    setMsg('ステータス自動変更を設定しました');
  };

  const deleteList = () => {
    if (confirm(`リスト「${list.name}」を削除します。中のタスクはアーカイブされます。よろしいですか？`)) {
      dispatch({ type:'DELETE_LIST', projectId: project.id, listId: list.id });
    }
    setShowMenu(false);
  };

  return (
    <div className="w-72 flex-shrink-0 bg-white dark:bg-ink-800 hairline rounded-md flex flex-col max-h-full shadow-card"
         onDragOver={onDragOver} onDragLeave={onDragLeave} onDrop={(e)=>onDrop(e,list.id)}>
      <div className="px-3 pt-2.5 pb-2 flex items-center gap-2 border-b border-ink-100 dark:border-ink-700/60">
        {list.autoStatus && <span className={`w-1.5 h-1.5 rounded-full ${statusObj(list.autoStatus).dot}`} title={`移動時に「${statusObj(list.autoStatus).label}」に自動設定`}></span>}
        {editing ? (
          <input autoFocus value={editName} onChange={e=>setEditName(e.target.value)} onBlur={saveListName} onKeyDown={e=>e.key==='Enter'&&saveListName()}
            className="flex-1 px-1.5 py-0.5 rounded border border-accent-400 bg-white dark:bg-ink-700 text-[13px] focus:outline-none" />
        ) : (
          <h3 onClick={()=>setEditing(true)} className="flex-1 font-semibold text-[13px] cursor-pointer tracking-tight">{list.name}</h3>
        )}
        <span className="text-[11px] text-ink-400 num">{tasks.length}</span>
        <div className="relative">
          <button onClick={()=>setShowMenu(!showMenu)} className="text-ink-400 hover:text-ink-800 dark:hover:text-ink-100 px-1 leading-none">⋯</button>
          {showMenu && <div className="absolute right-0 top-7 w-56 bg-white dark:bg-ink-800 hairline rounded-md shadow-pop z-30 overflow-hidden">
            <div className="px-3 py-2 text-[10px] font-semibold uppercase tracking-wider text-ink-400 border-b border-ink-100 dark:border-ink-700/60">移動時のステータス</div>
            <button onClick={()=>setAutoStatus('')} className={`w-full text-left px-3 py-1.5 text-[13px] hover:bg-ink-50 dark:hover:bg-ink-700/40 ${!list.autoStatus?'bg-accent-50 dark:bg-accent-900/20':''}`}>変更しない</button>
            {STATUSES.map(s => (
              <button key={s.id} onClick={()=>setAutoStatus(s.id)} className={`w-full text-left px-3 py-1.5 text-[13px] hover:bg-ink-50 dark:hover:bg-ink-700/40 flex items-center gap-2 ${list.autoStatus===s.id?'bg-accent-50 dark:bg-accent-900/20':''}`}>
                <span className={`w-1.5 h-1.5 rounded-full ${s.dot}`}></span>{s.label}
              </button>
            ))}
            <div className="border-t border-ink-100 dark:border-ink-700/60">
              <button onClick={deleteList} className="w-full text-left px-3 py-1.5 text-[13px] text-rose-600 hover:bg-rose-50 dark:hover:bg-rose-900/20">リストを削除</button>
            </div>
          </div>}
        </div>
      </div>

      <div className="flex-1 overflow-y-auto px-2 py-2 space-y-2 scrollbar-thin min-h-[80px]">
        {tasks.map(t => (
          <BoardCard key={t.id} task={t} project={project}
            onClick={() => openTask(t.id)}
            onDragStart={(e)=>onDragStart(e,t.id)}
            isDragging={draggingTaskId===t.id}
            isSelected={bulkSelected.has(t.id)}
            onToggleSelect={(e) => { if (e.metaKey || e.ctrlKey) { e.preventDefault(); onToggleSelect(t.id); } }}
          />
        ))}
        {tasks.length === 0 && <div className="text-center text-[11px] text-ink-300 py-6">ここにドロップ</div>}
      </div>

      <div className="px-2 pb-2 border-t border-ink-100 dark:border-ink-700/60 pt-1.5">
        {adding ? (
          <div className="space-y-1.5">
            <textarea autoFocus value={newTitle} onChange={e=>setNewTitle(e.target.value)} placeholder="タスク名を入力" rows={2}
              onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addTask();}}}
              className="w-full px-2 py-1.5 rounded border border-ink-200 dark:border-ink-700 bg-white dark:bg-ink-700 text-[13px] focus:outline-none focus:ring-2 focus:ring-accent-300 resize-none" />
            <div className="flex gap-1">
              <Btn size="xs" onClick={addTask}>追加</Btn>
              <Btn size="xs" variant="ghost" onClick={()=>{setAdding(false);setNewTitle('');}}>キャンセル</Btn>
            </div>
          </div>
        ) : (
          <button onClick={()=>setAdding(true)} className="w-full text-left text-[12px] text-ink-500 hover:text-accent-600 px-2 py-1">＋ カードを追加</button>
        )}
      </div>
    </div>
  );
}

function BoardCard({ task, project, onClick, onDragStart, isDragging, isSelected, onToggleSelect }) {
  const { state } = useApp();
  const org = state.organizations.find(o => o.id===project.orgId);
  const overdue = task.dueDate && isPastDate(task.dueDate) && task.status!=='completed';
  const dueToday = isTodayDate(task.dueDate) && task.status!=='completed';
  const dueTomorrow = isTomorrow(task.dueDate) && task.status!=='completed';
  const checklistDone = task.checklist.filter(c => c.done).length;
  const followed = task.followers.includes(state.currentUserId);

  return (
    <div draggable onDragStart={onDragStart}
      onClick={(e)=>{ if(e.metaKey||e.ctrlKey){ onToggleSelect(e); } else { onClick(); } }}
      className={`bg-white dark:bg-ink-700/80 rounded-md hairline px-2.5 py-2 cursor-pointer hover:shadow-card transition group ${isDragging?'card-dragging':''} ${isSelected?'selected-card':''}`}>
      {task.labels.length > 0 && <div className="flex flex-wrap gap-1 mb-1.5">
        {task.labels.map(lid => { const l = labelById(project, lid); return l ? <LabelPill key={lid} label={l} /> : null; })}
      </div>}
      <div className="flex items-start gap-1.5">
        <span className="text-[10px] text-ink-400 mt-0.5 num">#{String(task.taskNumber).padStart(3,'0')}</span>
        <span className="flex-1 text-[13px] leading-snug">{task.title}</span>
        {followed && <span className="text-amber-500 text-[11px] mt-0.5">★</span>}
      </div>
      {(task.dueDate || task.checklist.length>0 || task.comments.length>0 || task.files.length>0 || task.assignees.length>0) &&
      <div className="flex items-center justify-between mt-2 text-[11px]">
        <div className="flex items-center gap-2 text-ink-500 num">
          {task.dueDate && <span className={`flex items-center gap-1 ${overdue?'text-rose-600 font-semibold':dueToday?'text-rose-500':dueTomorrow?'text-amber-600':''}`}>
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
            {fmtDate(task.dueDate).slice(5)}
          </span>}
          {task.checklist.length > 0 && <span title="チェックリスト">☑ {checklistDone}/{task.checklist.length}</span>}
          {task.comments.length > 0 && <span title="コメント">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="inline mr-0.5 -mt-0.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            {task.comments.length}</span>}
          {task.files.length > 0 && <span title="添付">📎 {task.files.length}</span>}
        </div>
        <div className="flex -space-x-1.5">
          {task.assignees.slice(0,3).map(uid => <Avatar key={uid} user={userById(org,uid)} size={20} ring />)}

        </div>
      </div>}
    </div>
  );
}
